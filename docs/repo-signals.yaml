# TeamWeave Repo Signals
# Auto-generated design-pattern inventory for tooling, AI assistants, and onboarding.
# Last updated: 2026-03-20

meta:
  project: TeamWeave
  description: Config-driven serverless multi-agent orchestration platform on AWS
  runtime: python3.12
  region: us-east-1

# ---------------------------------------------------------------------------
# Architectural Patterns
# ---------------------------------------------------------------------------
architectural_patterns:

  - name: Serverless Event-Driven Architecture
    category: architectural
    files:
      - src/orchestrator/trigger_handler.py
      - src/orchestrator/worker_handler.py
      - src/orchestrator/status_handler.py
      - infra/template.yaml
    description: >
      API Gateway → Lambda → Step Functions → Lambda (worker) → Bedrock Agents.
      Every run is async; clients poll GET /team/task/{run_id} for terminal state.

  - name: Pipeline / Data-Flow Pattern
    category: architectural
    files:
      - src/orchestrator/worker_handler.py
      - src/orchestrator/handler.py
    description: >
      Linear agent pipeline where the output of step N is injected as input to
      step N+1. Results accumulate in an `outputs` dict that every downstream
      step can read.

  - name: Multi-Agent Collaboration
    category: architectural
    files:
      - src/orchestrator/worker_handler.py
      - src/orchestrator/handler.py
      - infra/bedrock-agents.yaml
    description: >
      Multiple Amazon Bedrock agents collaborate sequentially. A supervisor
      agent (role="supervisor") produces a brief that guides specialist agents
      (strategist, writer, editor, distributor).

  - name: Configuration-Driven Workflow
    category: architectural
    files:
      - src/orchestrator/config_loader.py
      - config/examples/teams/
    description: >
      All workflow logic lives in JSON stored in S3 (team.json): agents,
      pipeline steps, RAG settings, output schemas, and feature flags. No
      Lambda code changes are needed to create or modify workflows.

  - name: Step Functions Orchestration
    category: architectural
    files:
      - src/orchestrator/trigger_handler.py
      - src/orchestrator/status_handler.py
      - infra/template.yaml
    description: >
      Trigger Lambda calls start_execution(); Status Lambda polls
      describe_execution(). Worker Lambda is the activity processor invoked
      by the state machine for each pipeline run.

  - name: Async Request / Poll Pattern
    category: architectural
    files:
      - src/orchestrator/trigger_handler.py
      - src/orchestrator/status_handler.py
    description: >
      POST /team/task returns run_id immediately. The caller polls
      GET /team/task/{run_id} until SUCCEEDED or FAILED.

  - name: Infrastructure as Code (SAM / CloudFormation)
    category: architectural
    files:
      - infra/template.yaml
      - infra/bedrock-agents.yaml
      - infra/samconfig.toml
    description: >
      AWS SAM templates parameterise all resources (VPC, buckets, DynamoDB,
      Bedrock agent IDs). Conditional blocks create or reuse resources based
      on parameters (CreateConfigBucket, CreateDdbTable, DeployWAF).

  - name: VPC-Isolated Lambda
    category: architectural
    files:
      - infra/template.yaml
      - src/orchestrator/rag.py
    description: >
      Lambda functions run inside a private VPC with ENIs so they can reach
      RDS (pgvector). Security-group ingress rules are generated by SAM.

# ---------------------------------------------------------------------------
# Structural / Code-Organisation Patterns
# ---------------------------------------------------------------------------
structural_patterns:

  - name: Data Access Object (DAO)
    category: structural
    files:
      - src/orchestrator/db.py
    description: >
      DbDao encapsulates all DynamoDB operations: get_item, put_item,
      put_run_meta, put_step, list_tasks, mark_task_done,
      list_completed_topic_levels. DbDao.from_team_config() is the preferred
      factory constructor.

  - name: Lambda Handler / Adapter
    category: structural
    files:
      - src/orchestrator/handler.py
      - src/orchestrator/trigger_handler.py
      - src/orchestrator/worker_handler.py
      - src/orchestrator/status_handler.py
    description: >
      Each handler normalises the API Gateway event via helpers (_method,
      _path, _qs, _json_body, _cors, _resp) then delegates to pure business-
      logic functions, keeping HTTP concerns separate from domain logic.

  - name: Factory Method
    category: structural
    files:
      - src/orchestrator/config_loader.py
      - src/orchestrator/db.py
      - src/orchestrator/models.py
    description: >
      load_team_config() returns a typed (TeamConfig, raw_dict) tuple.
      DbDao.from_team_config() builds a DAO from config. Dataclass
      constructors (TeamGlobals, AgentConfig, BedrockRef) build typed objects.

  - name: Facade
    category: structural
    files:
      - src/orchestrator/storage.py
    description: >
      save_artifact() is a thin facade over S3: it constructs the key path
      (runs/{run_id}/{step_id}.json), serialises to JSON, and calls put_object.

  - name: Decorator / Wrapper (Telemetry)
    category: structural
    files:
      - src/orchestrator/bedrock_invoke.py
      - src/orchestrator/bedrock_wrappers.py
      - src/orchestrator/mcp_observatory.py
    description: >
      mcp_observatory wraps every Bedrock invocation with observe_agent_request
      / observe_model_request, injecting latency, token counts, cost, and
      optional shadow-model comparison without modifying core invocation code.

  - name: Builder / Fluent Assembly
    category: structural
    files:
      - src/orchestrator/prompt_builder.py
      - src/orchestrator/enrich.py
    description: >
      build_prompt() assembles multi-section LLM prompts by conditionally
      appending RAG context, owner profile, Gemini brief, schema instructions,
      and prior step outputs.

  - name: Strategy (RAG Mode Selection)
    category: structural
    files:
      - src/orchestrator/rag.py
      - src/orchestrator/profile_context.py
      - src/orchestrator/gemini.py
    description: >
      get_rag_context() dispatches to different retrieval strategies at runtime
      based on rag.mode in team config: "explicit" (pgvector cosine search),
      "history" (DynamoDB execution history), or "kb" (Bedrock Knowledge Base).

  - name: Template Method
    category: structural
    files:
      - src/orchestrator/worker_handler.py
      - src/orchestrator/handler.py
    description: >
      run_team_pipeline() defines the invariant workflow skeleton (load config
      → init DAO → get RAG context → loop steps → invoke agent → validate →
      save artifact → mark done). Individual steps are pluggable via config.

  - name: Transformer / Converter
    category: structural
    files:
      - src/orchestrator/structured_transform.py
      - src/orchestrator/json_utils.py
      - src/orchestrator/schema_validate.py
    description: >
      transform_json_to_schema() uses Claude to reshape agent JSON output to a
      target schema. extract_json_payload() applies multi-strategy fuzzy
      extraction. normalize_target_schema() converts JSON Schema ↔ template.

# ---------------------------------------------------------------------------
# Behavioural Patterns
# ---------------------------------------------------------------------------
behavioural_patterns:

  - name: Chain of Responsibility (Step Pipeline)
    category: behavioural
    files:
      - src/orchestrator/worker_handler.py
      - src/orchestrator/handler.py
    description: >
      Each pipeline step receives the accumulated `outputs` dict from all
      previous steps. _build_step_inputs() merges them so any downstream step
      can access any predecessor's result. The chain short-circuits on
      StepFailed.

  - name: Retry with Exponential Back-off
    category: behavioural
    files:
      - src/orchestrator/bedrock_invoke.py
    description: >
      invoke_agent() retries up to max_retries (default 2) on transient errors.
      Auth / token errors raise StepFailed immediately (fail-fast). Backoff
      delay doubles between attempts.

  - name: Fallback / Graceful Degradation
    category: behavioural
    files:
      - src/orchestrator/json_utils.py
      - src/orchestrator/enrich.py
      - src/orchestrator/structured_transform.py
    description: >
      extract_json_payload() cascades through four extraction strategies before
      giving up. enrich_step_output() returns raw_output on any exception.
      _build_transform_fallback() coerces failed LLM transformations to a safe
      default response.

  - name: Observer / Telemetry
    category: behavioural
    files:
      - src/orchestrator/mcp_observatory.py
      - src/orchestrator/amp_metrics.py
    description: >
      Invocation wrappers emit metrics to DynamoDB (ObservatoryMetricsTable)
      and push Protobuf-encoded time-series to Amazon Managed Prometheus via
      remote_write — decoupled from core pipeline logic.

  - name: Dual Inference / Shadow Model
    category: behavioural
    files:
      - src/orchestrator/mcp_observatory.py
      - src/orchestrator/bedrock_invoke.py
    description: >
      If shadow_alias_id is present, a second model alias runs in parallel via
      asyncio. Telemetry records shadow_disagreement_score and
      shadow_numeric_variance for A/B model evaluation.

  - name: Enrichment / Post-Processing
    category: behavioural
    files:
      - src/orchestrator/enrich.py
    description: >
      enrich_step_output() uses Claude to detect placeholder / refusal text
      from Nova, rewrite copy to the owner's voice, enforce schema compliance,
      and regenerate from step context when needed.

  - name: Guardrail Intercept
    category: behavioural
    files:
      - src/orchestrator/bedrock_invoke.py
    description: >
      Bedrock INTERVENED guardrail actions are detected in response headers,
      logged, and tracked separately so they can be audited without failing
      the step silently.

  - name: Custom Exception Domain Model
    category: behavioural
    files:
      - src/orchestrator/models.py
    description: >
      StepFailed(step_id, message, raw_output) carries structured context
      about a failed workflow step, caught at the handler boundary and
      serialised into a standard error response.

# ---------------------------------------------------------------------------
# Data / Persistence Patterns
# ---------------------------------------------------------------------------
data_patterns:

  - name: Composite Key (DynamoDB)
    category: data
    files:
      - src/orchestrator/db.py
    description: >
      Partition + sort key conventions:
        Runs   → pk=RUN#{run_id},  sk=META | STEP#{step_id}
        Tasks  → pk=TASK#{owner},  sk=DATE#{ymd}#TASK#{task_id}
        Observatory → pk=OBSERVATORY#{operation}, sk={ts}#{trace_id}

  - name: TTL / Auto-Expiration
    category: data
    files:
      - src/orchestrator/mcp_observatory.py
    description: >
      Observatory metric items carry a DynamoDB TTL of 90 days for automatic
      cleanup without manual purge jobs.

  - name: S3 Artifact Lifecycle
    category: data
    files:
      - infra/template.yaml
      - src/orchestrator/storage.py
    description: >
      Step output JSON is stored at s3://{bucket}/runs/{run_id}/{step_id}.json.
      S3 lifecycle rules transition objects to IA after 30 days, GLACIER after
      90 days, and expire them after 365 days.

  - name: Caching / Lazy Initialisation
    category: data
    files:
      - src/orchestrator/rag.py
      - src/orchestrator/mcp_observatory.py
      - src/orchestrator/enrich.py
    description: >
      Module-level singletons (_db_secret_cache, _ddb_table, _bedrock_runtime)
      are populated on first use to amortise Lambda cold-start overhead across
      warm invocations.

# ---------------------------------------------------------------------------
# Validation Patterns
# ---------------------------------------------------------------------------
validation_patterns:

  - name: JSON Schema Validation
    category: validation
    files:
      - src/orchestrator/schema_validate.py
      - config/examples/schemas/
    description: >
      Agent outputs are validated against JSON Schema Draft 2023-12 via the
      jsonschema library. validate_or_unwrap_output() also handles single-key
      envelope responses and schema-specific normalisations (e.g. objective →
      goal for CreativeBriefV1).

  - name: Type Coercion
    category: validation
    files:
      - src/orchestrator/structured_transform.py
    description: >
      _coerce_to_template() applies best-effort type conversion: empty string
      fallback for strings, 0 for numeric parse errors, case-insensitive bool
      parsing ("true"/"1"/"yes"), and recursive coercion for objects/arrays.

  - name: Output Normalisation
    category: validation
    files:
      - src/orchestrator/json_utils.py
      - src/orchestrator/structured_transform.py
      - src/orchestrator/enrich.py
    description: >
      Pipeline strips markdown fences, removes control characters, normalises
      curly quotes to straight quotes, and recursively decodes double-encoded
      JSON (max depth 3) before validation.

  - name: PII Redaction
    category: validation
    files:
      - src/orchestrator/profile_context.py
    description: >
      Regex patterns scrub emails, SSNs, and phone numbers from RAG context
      before injecting it into LLM prompts.

# ---------------------------------------------------------------------------
# Integration Patterns
# ---------------------------------------------------------------------------
integration_patterns:

  - name: Secrets Manager Credential Injection
    category: integration
    files:
      - src/orchestrator/rag.py
      - src/orchestrator/gemini.py
      - src/orchestrator/mcp_observatory.py
      - infra/template.yaml
    description: >
      All credentials (DB password, Gemini API key) are stored in AWS Secrets
      Manager. ARNs are injected as environment variables by SAM; Lambda
      fetches the secret value at runtime. Never hardcoded.

  - name: Environment Variable Configuration
    category: integration
    files:
      - infra/template.yaml
      - src/orchestrator/trigger_handler.py
      - src/orchestrator/worker_handler.py
      - src/orchestrator/status_handler.py
    description: >
      SAM wires CloudFormation resource ARNs/names into Lambda environment
      variables (CONFIG_BUCKET, ARTIFACT_BUCKET, DDB_TABLE, STATE_MACHINE_ARN,
      etc.). Runtime code reads them via os.environ.

  - name: Protobuf Remote-Write (AMP)
    category: integration
    files:
      - src/orchestrator/amp_metrics.py
    description: >
      Hand-coded varint/wire-type Protobuf encoder (no grpc dependency) builds
      a WriteRequest and pushes time-series to Amazon Managed Prometheus via
      the Prometheus remote_write HTTP endpoint with Snappy compression.

  - name: pgvector Similarity Search
    category: integration
    files:
      - src/orchestrator/rag.py
    description: >
      Text is embedded with Bedrock Titan; the resulting vector is used for
      cosine distance search (`<=>`) against the rag_chunks table in RDS
      PostgreSQL 15 + pgvector. Falls back to ILIKE keyword search if
      embedding is unavailable.

  - name: Gemini External Research
    category: integration
    files:
      - src/orchestrator/gemini.py
    description: >
      Google Gemini 2.0 Flash is called as an optional enrichment step to
      generate a research brief that is injected into the pipeline context
      (features.gemini_research flag in team config).

  - name: Conditional Feature Flags (Config)
    category: integration
    files:
      - config/examples/teams/
      - src/orchestrator/worker_handler.py
    description: >
      features.gemini_research, features.explicit_rag, rag.mode, and
      owner_profile.enabled in team.json toggle capabilities at runtime
      without code changes.
