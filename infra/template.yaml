AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bedrock multi-agent teams + personal improvement tasks (config-driven)

Parameters:
  ConfigBucketName:
    Type: String
    Default: ""
    Description: S3 bucket that holds team configs (teams/{TEAM}/{VERSION}/team.json)
  ArtifactBucketName:
    Type: String
    Default: ""
    Description: S3 bucket for run artifacts (runs/{run_id}/{step_id}.json)
  TeamConfigPrefix:
    Type: String
    Default: teams
    Description: "Prefix in config bucket for team configs (default: teams)"
  VectorDbTable:
    Type: String
    Default: "rag_chunks"
    Description: Vector store collection/table identifier (used for explicit RAG mode)
  VectorDbHost:
    Type: String
    Default: "resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com"
    Description: PostgreSQL host for explicit RAG mode (pgvector)
  VectorDbPort:
    Type: String
    Default: "5432"
    Description: PostgreSQL port for explicit RAG mode
  VectorDbName:
    Type: String
    Default: "postgres"
    Description: PostgreSQL database name for explicit RAG mode
  VectorDbUser:
    Type: String
    Default: "masteruser"
    Description: PostgreSQL username for explicit RAG mode
  VectorDbPassword:
    Type: String
    NoEcho: true
    Default: "YourStrongPassword123!"
    Description: PostgreSQL password for explicit RAG mode
  VectorDbUrl:
    Type: String
    NoEcho: true
    Default: "postgresql://masteruser:YourStrongPassword123!@resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com:5432/postgres"
    Description: Full PostgreSQL connection URL. When set, this overrides host/port/name/user/password parameters.
  GeminiSecretArn:
    Type: String
    Default: ""
    Description: (Optional) Secrets Manager ARN storing Gemini API key JSON (e.g. {"key":"..."})
  DdbTableName:
    Type: String
    Default: ""
    Description: Optional. Leave blank to create a new DynamoDB table.
  VpcId:
    Type: String
    Default: "vpc-f3c92a8a"
    Description: VPC ID for Lambda networking to RDS.
  LambdaSubnetIds:
    Type: String
    Default: ""
    Description: Comma-separated private subnet IDs for Lambda ENIs (required for VPC connectivity).
  RdsSecurityGroupId:
    Type: String
    Default: "sg-06e6751625773c1bf"
    Description: RDS security group ID (resume-rag-sg) to allow PostgreSQL traffic from Lambda.
  GuardrailName:
    Type: String
    Default: tarun-agents-guardrail
    Description: Name for the Bedrock Guardrail created by this stack.
  GuardrailDescription:
    Type: String
    Default: Generic guardrail for all Tarun's Bedrock agents - content filtering and safety
    Description: Description for the Bedrock Guardrail.

Conditions:
  CreateConfigBucket: !Equals [!Ref ConfigBucketName, ""]
  CreateArtifactBucket: !Equals [!Ref ArtifactBucketName, ""]
  CreateDdbTable: !Equals [!Ref DdbTableName, ""]
  HasGeminiSecret: !Not [!Equals [!Ref GeminiSecretArn, ""]]
  HasVpcConfig: !And
    - !Not [!Equals [!Ref VpcId, ""]]
    - !Not [!Equals [!Ref RdsSecurityGroupId, ""]]
    - !Not [!Equals [!Ref LambdaSubnetIds, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  TeamConfigBucket:
    Type: AWS::S3::Bucket
    Condition: CreateConfigBucket

  TeamArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: CreateArtifactBucket

  ContentPipelineRunsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateDdbTable
    Properties:
      TableName: !Sub "${AWS::StackName}-CONTENT_PIPELINE_RUNS"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  OrchestratorExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-orchestrator-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: orchestrator-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action: [s3:GetObject]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action: [s3:PutObject]
                Resource: !If
                  - CreateArtifactBucket
                  - !Sub "${TeamArtifactBucket.Arn}/*"
                  - !Sub "arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*"
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*/index/*"
              - Effect: Allow
                Action:
                  - bedrock-agent-runtime:InvokeAgent
                  - bedrock:InvokeAgent
                Resource: "*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/*"
              - !If
                - HasGeminiSecret
                - Effect: Allow
                  Action: [secretsmanager:GetSecretValue]
                  Resource: !Ref GeminiSecretArn
                - !Ref "AWS::NoValue"

  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/handler.handler
      Role: !GetAtt OrchestratorExecutionRole.Arn
      Events:
        TeamTaskEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /team/task
            Method: post
            TimeoutInMillis: 300000
        ImproveTasksEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/tasks
            Method: get
            TimeoutInMillis: 300000
        ImproveTaskDoneEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/task/done
            Method: post
            TimeoutInMillis: 300000
      Environment:
        Variables:
          CONFIG_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          CONFIG_PREFIX: !Ref TeamConfigPrefix
          ARTIFACT_BUCKET: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
          DDB_TABLE: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
          VECTOR_DB_TABLE: !Ref VectorDbTable
          VECTOR_DB_HOST: !Ref VectorDbHost
          VECTOR_DB_PORT: !Ref VectorDbPort
          VECTOR_DB_NAME: !Ref VectorDbName
          VECTOR_DB_USER: !Ref VectorDbUser
          VECTOR_DB_PASSWORD: !Ref VectorDbPassword
          VECTOR_DB_URL: !Ref VectorDbUrl
          VECTOR_DB_SSLMODE: verify-full
          VECTOR_DB_SSL_ROOT_CERT: /var/task/certs/rds-ca-bundle.pem
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_MODEL: gemini-2.0-flash
      VpcConfig: !If
        - HasVpcConfig
        - SecurityGroupIds:
            - !Ref OrchestratorSecurityGroup
          SubnetIds: !Split [",", !Ref LambdaSubnetIds]
        - !Ref AWS::NoValue

  OrchestratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasVpcConfig
    Properties:
      GroupDescription: Lambda security group for outbound PostgreSQL access to RDS
      VpcId: !Ref VpcId

  OrchestratorToRdsEgress5432:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref OrchestratorSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RdsSecurityGroupId

  RdsIngressFromOrchestrator5432:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref RdsSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref OrchestratorSecurityGroup

  TeamWeaveApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'content-type'"
        AllowMethods: "'POST,GET,OPTIONS'"

  TeamWeaveGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Ref GuardrailName
      Description: !Ref GuardrailDescription
      BlockedInputMessaging: I cannot process this request as it contains content that violates our content policy. Please rephrase your request without sensitive or inappropriate content.
      BlockedOutputsMessaging: I cannot provide this response as it contains content that violates our content policy. Please ask for information in a different way.
      TopicPolicyConfig:
        TopicsConfig:
          - Name: HarmfulContent
            Definition: Content that promotes violence, illegal activities, or harmful behavior
            Examples:
              - How to make explosives
              - Instructions for illegal activities
              - Content promoting self-harm
            Type: DENY
          - Name: PersonalInformation
            Definition: Requests for or sharing of personal identifiable information
            Examples:
              - What is your social security number
              - Share personal contact details
              - Private financial information
            Type: DENY
          - Name: InappropriateContent
            Definition: Adult content, profanity, or inappropriate material
            Examples:
              - Explicit sexual content
              - Excessive profanity
              - Inappropriate jokes
            Type: DENY
      ContentPolicyConfig:
        FiltersConfig:
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      WordPolicyConfig:
        WordsConfig:
          - Text: confidential
          - Text: secret
          - Text: password
          - Text: private key
        ManagedWordListsConfig:
          - Type: PROFANITY
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: EMAIL
            Action: BLOCK
          - Type: PHONE
            Action: BLOCK
          - Type: US_SOCIAL_SECURITY_NUMBER
            Action: BLOCK
          - Type: CREDIT_DEBIT_CARD_NUMBER
            Action: BLOCK
          - Type: ADDRESS
            Action: ANONYMIZE
          - Type: NAME
            Action: ANONYMIZE
        RegexesConfig:
          - Name: APIKeys
            Description: Block API keys and tokens
            Pattern: (api[_-]?key|access[_-]?token|secret[_-]?key)\s*[:=]\s*[A-Za-z0-9]{20,}
            Action: BLOCK

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${TeamWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  OrchestratorFunctionName:
    Value: !Ref OrchestratorFunction
  OrchestratorExecutionRoleArn:
    Value: !GetAtt OrchestratorExecutionRole.Arn
  DdbTable:
    Value: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
  BedrockGuardrailId:
    Value: !Ref TeamWeaveGuardrail
  BedrockGuardrailArn:
    Value: !GetAtt TeamWeaveGuardrail.GuardrailArn
