AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bedrock multi-agent teams + personal improvement tasks (config-driven)

Parameters:
  ConfigBucketName:
    Type: String
    Default: ""
    Description: S3 bucket that holds team configs (teams/{TEAM}/{VERSION}/team.json)
  ArtifactBucketName:
    Type: String
    Default: ""
    Description: S3 bucket for run artifacts (runs/{run_id}/{step_id}.json)
  TeamConfigPrefix:
    Type: String
    Default: teams
    Description: "Prefix in config bucket for team configs (default: teams)"
  VectorDbTable:
    Type: String
    Default: "postgres"
    Description: Vector store collection/table identifier (used for explicit RAG mode)
  VectorDbHost:
    Type: String
    Default: "cplgkqp9qd3a.us-east-1.rds.amazonaws.com"
    Description: PostgreSQL host for explicit RAG mode (pgvector)
  VectorDbPort:
    Type: String
    Default: "5432"
    Description: PostgreSQL port for explicit RAG mode
  VectorDbName:
    Type: String
    Default: "resume-rag-db"
    Description: PostgreSQL database name for explicit RAG mode
  VectorDbUser:
    Type: String
    Default: "masteruser"
    Description: PostgreSQL username for explicit RAG mode
  VectorDbPassword:
    Type: String
    NoEcho: true
    Default: "YourStrongPassword123!"
    Description: PostgreSQL password for explicit RAG mode
  VectorDbUrl:
    Type: String
    NoEcho: true
    Default: "postgresql://masteruser:YourStrongPassword123!@resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com:5432/postgres"
    Description: Full PostgreSQL connection URL. When set, this overrides host/port/name/user/password parameters.
  GeminiSecretArn:
    Type: String
    Default: ""
    Description: (Optional) Secrets Manager ARN storing Gemini API key JSON (e.g. {"key":"..."})
  DdbTableName:
    Type: String
    Default: ""
    Description: Optional. Leave blank to create a new DynamoDB table.
  GuardrailName:
    Type: String
    Default: tarun-agents-guardrail
    Description: Name for the Bedrock Guardrail created by this stack.
  GuardrailDescription:
    Type: String
    Default: Generic guardrail for all Tarun's Bedrock agents - content filtering and safety
    Description: Description for the Bedrock Guardrail.

Conditions:
  CreateConfigBucket: !Equals [!Ref ConfigBucketName, ""]
  CreateArtifactBucket: !Equals [!Ref ArtifactBucketName, ""]
  CreateDdbTable: !Equals [!Ref DdbTableName, ""]
  HasGeminiSecret: !Not [!Equals [!Ref GeminiSecretArn, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  TeamConfigBucket:
    Type: AWS::S3::Bucket
    Condition: CreateConfigBucket

  TeamArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: CreateArtifactBucket

  ContentPipelineRunsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateDdbTable
    Properties:
      TableName: !Sub "${AWS::StackName}-CONTENT_PIPELINE_RUNS"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/handler.handler
      Events:
        TeamTaskEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /team/task
            Method: post
        ImproveTasksEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/tasks
            Method: get
        ImproveTaskDoneEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/task/done
            Method: post
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            Effect: Allow
            Action: [s3:GetObject]
            Resource: !If
              - CreateConfigBucket
              - !Sub "${TeamConfigBucket.Arn}/*"
              - !Sub "arn:aws:s3:::${ConfigBucketName}/*"
        - Statement:
            Effect: Allow
            Action: [s3:PutObject]
            Resource: !If
              - CreateArtifactBucket
              - !Sub "${TeamArtifactBucket.Arn}/*"
              - !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*/index/*"
        - Statement:
            Effect: Allow
            Action: [bedrock-agent-runtime:InvokeAgent]
            Resource: "*"
        - !If
          - HasGeminiSecret
          - Statement:
              Effect: Allow
              Action: [secretsmanager:GetSecretValue]
              Resource: !Ref GeminiSecretArn
          - !Ref "AWS::NoValue"
      Environment:
        Variables:
          CONFIG_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          CONFIG_PREFIX: !Ref TeamConfigPrefix
          ARTIFACT_BUCKET: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
          DDB_TABLE: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
          VECTOR_DB_TABLE: !Ref VectorDbTable
          VECTOR_DB_HOST: !Ref VectorDbHost
          VECTOR_DB_PORT: !Ref VectorDbPort
          VECTOR_DB_NAME: !Ref VectorDbName
          VECTOR_DB_USER: !Ref VectorDbUser
          VECTOR_DB_PASSWORD: !Ref VectorDbPassword
          VECTOR_DB_URL: !Ref VectorDbUrl
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_MODEL: gemini-2.0-flash

  TeamWeaveApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'content-type'"
        AllowMethods: "'POST,GET,OPTIONS'"

  TeamWeaveGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Ref GuardrailName
      Description: !Ref GuardrailDescription
      BlockedInputMessaging: I cannot process this request as it contains content that violates our content policy. Please rephrase your request without sensitive or inappropriate content.
      BlockedOutputsMessaging: I cannot provide this response as it contains content that violates our content policy. Please ask for information in a different way.
      TopicPolicyConfig:
        TopicsConfig:
          - Name: Harmful Content
            Definition: Content that promotes violence, illegal activities, or harmful behavior
            Examples:
              - How to make explosives
              - Instructions for illegal activities
              - Content promoting self-harm
            Type: DENY
          - Name: Personal Information
            Definition: Requests for or sharing of personal identifiable information
            Examples:
              - What is your social security number
              - Share personal contact details
              - Private financial information
            Type: DENY
          - Name: Inappropriate Content
            Definition: Adult content, profanity, or inappropriate material
            Examples:
              - Explicit sexual content
              - Excessive profanity
              - Inappropriate jokes
            Type: DENY
      ContentPolicyConfig:
        FiltersConfig:
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      WordPolicyConfig:
        WordsConfig:
          - Text: confidential
          - Text: secret
          - Text: password
          - Text: private key
        ManagedWordListsConfig:
          - Type: PROFANITY
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: EMAIL
            Action: BLOCK
          - Type: PHONE
            Action: BLOCK
          - Type: SSN
            Action: BLOCK
          - Type: CREDIT_DEBIT_CARD_NUMBER
            Action: BLOCK
          - Type: ADDRESS
            Action: ANONYMIZE
          - Type: NAME
            Action: ANONYMIZE
        RegexesConfig:
          - Name: API Keys
            Description: Block API keys and tokens
            Pattern: (?i)(api[_-]?key|access[_-]?token|secret[_-]?key)\s*[:=]\s*['"]?[a-zA-Z0-9]{20,}['"]?
            Action: BLOCK

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${TeamWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  OrchestratorFunctionName:
    Value: !Ref OrchestratorFunction
  DdbTable:
    Value: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
  BedrockGuardrailId:
    Value: !Ref TeamWeaveGuardrail
  BedrockGuardrailArn:
    Value: !GetAtt TeamWeaveGuardrail.GuardrailArn
