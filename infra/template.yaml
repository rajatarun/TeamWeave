AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bedrock multi-agent teams + personal improvement tasks (config-driven)

Parameters:
  ConfigBucketName:
    Type: String
    Default: ""
    Description: S3 bucket that holds team configs (teams/{TEAM}/{VERSION}/team.json)
  ArtifactBucketName:
    Type: String
    Default: ""
    Description: S3 bucket for run artifacts (runs/{run_id}/{step_id}.json)
  TeamConfigPrefix:
    Type: String
    Default: teams
    Description: "Prefix in config bucket for team configs (default: teams)"
  VectorDbTable:
    Type: String
    Default: "rag_chunks"
    Description: Vector store collection/table identifier (used for explicit RAG mode)
  VectorDbHost:
    Type: String
    Default: "resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com"
    Description: PostgreSQL host for explicit RAG mode (pgvector)
  VectorDbPort:
    Type: String
    Default: "5432"
    Description: PostgreSQL port for explicit RAG mode
  VectorDbName:
    Type: String
    Default: "postgres"
    Description: PostgreSQL database name for explicit RAG mode
  VectorDbUser:
    Type: String
    Default: "masteruser"
    Description: PostgreSQL username for explicit RAG mode
  VectorDbPassword:
    Type: String
    NoEcho: true
    Default: "YourStrongPassword123!"
    Description: PostgreSQL password for explicit RAG mode
  VectorDbUrl:
    Type: String
    NoEcho: true
    Default: "postgresql://masteruser:YourStrongPassword123!@resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com:5432/postgres"
    Description: Full PostgreSQL connection URL. When set, this overrides host/port/name/user/password parameters.
  GeminiSecretArn:
    Type: String
    Default: ""
    Description: (Optional) Secrets Manager ARN storing Gemini API key JSON (e.g. {"key":"..."})
  DdbTableName:
    Type: String
    Default: ""
    Description: Optional. Leave blank to create a new DynamoDB table.
  VpcId:
    Type: String
    Default: "vpc-f3c92a8a"
    Description: VPC ID for Lambda networking to RDS.
  LambdaSubnetIds:
    Type: String
    Default: ""
    Description: Comma-separated private subnet IDs for Lambda ENIs (required for VPC connectivity).
  RdsSecurityGroupId:
    Type: String
    Default: "sg-06e6751625773c1bf"
    Description: RDS security group ID (resume-rag-sg) to allow PostgreSQL traffic from Lambda.
  SamDeployerRoleName:
    Type: String
    Default: ""
    Description: Optional IAM role name used by CI/CD for SAM deployment. When set, stack creation grants Step Functions deployment permissions to this role.
  SamAssumeRoleName:
    Type: String
    Default: ""
    Description: Optional IAM role name assumed during `sam deploy` that needs S3 team config upload permissions.
  BedrockAgentServiceRoleArn:
    Type: String
    Default: "arn:aws:iam::239571291755:role/BedrockAgentServiceRole-Tarun"
    Description: IAM role ARN passed to Bedrock CreateAgent as AgentResourceRoleArn.

Conditions:
  CreateConfigBucket: !Equals [!Ref ConfigBucketName, ""]
  CreateArtifactBucket: !Equals [!Ref ArtifactBucketName, ""]
  CreateDdbTable: !Equals [!Ref DdbTableName, ""]
  HasGeminiSecret: !Not [!Equals [!Ref GeminiSecretArn, ""]]
  HasVpcConfig: !And
    - !Not [!Equals [!Ref VpcId, ""]]
    - !Not [!Equals [!Ref RdsSecurityGroupId, ""]]
    - !Not [!Equals [!Ref LambdaSubnetIds, ""]]
  HasSamDeployerRoleName: !Not [!Equals [!Ref SamDeployerRoleName, ""]]
  HasSamAssumeRoleName: !Not [!Equals [!Ref SamAssumeRoleName, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  TeamConfigBucket:
    Type: AWS::S3::Bucket
    Condition: CreateConfigBucket

  TeamArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: CreateArtifactBucket

  ContentPipelineRunsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateDdbTable
    Properties:
      TableName: !Sub "${AWS::StackName}-CONTENT_PIPELINE_RUNS"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-worker-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: worker-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action: [s3:GetObject]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action: [s3:PutObject]
                Resource: !If
                  - CreateArtifactBucket
                  - !Sub "${TeamArtifactBucket.Arn}/*"
                  - !Sub "arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*"
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*/index/*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock-agent-runtime:InvokeAgent
                Resource:
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock-agent-runtime:InvokeAgent
                Resource: "*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:application-inference-profile/*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt ProvisionTeamFunction.Arn
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-bedrock-agent-service-role"
              - !If
                - HasGeminiSecret
                - Effect: Allow
                  Action: [secretsmanager:GetSecretValue]
                  Resource: !Ref GeminiSecretArn
                - !Ref "AWS::NoValue"

  TriggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-trigger-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: trigger-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"
              - Effect: Allow
                Action:
                  - states:StartExecution
                  - sfn:StartExecution
                  - states:StartSyncExecution
                  - sfn:StartSyncExecution
                Resource: !Ref StateMachine
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action: [s3:GetObject]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*"
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*/index/*"

  StatusRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-status-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: status-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - states:DescribeExecution
                  - sfn:DescribeExecution
                Resource: "*"


  ProvisionTeamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-provision-team-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: provision-team-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action:
                  - bedrock:ListAgents
                  - bedrock:GetAgent
                  - bedrock:CreateAgent
                  - bedrock:PrepareAgent
                  - bedrock:CreateAgentAlias
                  - bedrock:ListAgentAliases
                  - bedrock:DeleteAgent
                  - bedrock:DeleteAgentAlias
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Ref BedrockAgentServiceRoleArn

  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-stepfunctions-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-worker
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt WorkerFunction.Arn
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"

  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${AWS::StackName}-state-machine"
      RetentionInDays: 30

  TriggerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/trigger_handler.handler
      Role: !GetAtt TriggerRole.Arn
      Events:
        TeamTaskEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /team/task
            Method: post
        ImproveTasksEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/tasks
            Method: get
        ImproveTaskDoneEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/task/done
            Method: post
        AgentsPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents
            Method: post
        AgentsGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents
            Method: get
        AgentsDeleteEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents
            Method: delete
        AgentByNameGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents/{name}
            Method: get
            RequestParameters:
              - method.request.path.name:
                  Required: true
                  Caching: false
        AgentByNamePutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents/{name}
            Method: put
            RequestParameters:
              - method.request.path.name:
                  Required: true
                  Caching: false
        TeamsGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams
            Method: get
        TeamsPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams
            Method: post
        TeamByNameGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/{team_name}
            Method: get
            RequestParameters:
              - method.request.path.team_name:
                  Required: true
                  Caching: false
        TeamByNamePutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/{team_name}
            Method: put
            RequestParameters:
              - method.request.path.team_name:
                  Required: true
                  Caching: false
        TeamByNameDeleteEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/{team_name}
            Method: delete
            RequestParameters:
              - method.request.path.team_name:
                  Required: true
                  Caching: false
        RolesGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles
            Method: get
        RolesPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles
            Method: post
        RoleByIdGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles/{role_id}
            Method: get
            RequestParameters:
              - method.request.path.role_id:
                  Required: true
                  Caching: false
        RoleByIdPutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles/{role_id}
            Method: put
            RequestParameters:
              - method.request.path.role_id:
                  Required: true
                  Caching: false
        DepartmentsGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments
            Method: get
        DepartmentsPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments
            Method: post
        DepartmentByIdGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments/{dept_id}
            Method: get
            RequestParameters:
              - method.request.path.dept_id:
                  Required: true
                  Caching: false
        DepartmentByIdPutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments/{dept_id}
            Method: put
            RequestParameters:
              - method.request.path.dept_id:
                  Required: true
                  Caching: false
      Environment:
        Variables:
          CONFIG_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          CONFIG_PREFIX: !Ref TeamConfigPrefix
          ARTIFACT_BUCKET: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
          DDB_TABLE: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
          VECTOR_DB_TABLE: !Ref VectorDbTable
          VECTOR_DB_HOST: !Ref VectorDbHost
          VECTOR_DB_PORT: !Ref VectorDbPort
          VECTOR_DB_NAME: !Ref VectorDbName
          VECTOR_DB_USER: !Ref VectorDbUser
          VECTOR_DB_PASSWORD: !Ref VectorDbPassword
          VECTOR_DB_URL: !Ref VectorDbUrl
          VECTOR_DB_SSLMODE: verify-full
          VECTOR_DB_SSL_ROOT_CERT: /var/task/certs/rds-ca-bundle.pem
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_MODEL: gemini-2.0-flash
          STATE_MACHINE_ARN: !Ref StateMachine
      VpcConfig: !If
        - HasVpcConfig
        - SecurityGroupIds:
            - !Ref OrchestratorSecurityGroup
          SubnetIds: !Split [",", !Ref LambdaSubnetIds]
        - !Ref AWS::NoValue

  WorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/worker_handler.handler
      Role: !GetAtt WorkerRole.Arn
      Environment:
        Variables:
          CONFIG_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          CONFIG_PREFIX: !Ref TeamConfigPrefix
          ARTIFACT_BUCKET: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
          DDB_TABLE: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
          VECTOR_DB_TABLE: !Ref VectorDbTable
          VECTOR_DB_HOST: !Ref VectorDbHost
          VECTOR_DB_PORT: !Ref VectorDbPort
          VECTOR_DB_NAME: !Ref VectorDbName
          VECTOR_DB_USER: !Ref VectorDbUser
          VECTOR_DB_PASSWORD: !Ref VectorDbPassword
          VECTOR_DB_URL: !Ref VectorDbUrl
          VECTOR_DB_SSLMODE: verify-full
          VECTOR_DB_SSL_ROOT_CERT: /var/task/certs/rds-ca-bundle.pem
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_MODEL: gemini-2.0-flash
          PROVISION_FUNCTION_NAME: !Ref ProvisionTeamFunction
      VpcConfig: !If
        - HasVpcConfig
        - SecurityGroupIds:
            - !Ref OrchestratorSecurityGroup
          SubnetIds: !Split [",", !Ref LambdaSubnetIds]
        - !Ref AWS::NoValue

  StatusFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/status_handler.handler
      Role: !GetAtt StatusRole.Arn
      Events:
        TeamTaskStatusEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /team/task/{run_id}
            Method: get
            RequestParameters:
              - method.request.path.run_id:
                  Required: true
                  Caching: false


  ProvisionTeamFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: config/examples/lambda_handler.handler
      Role: !GetAtt ProvisionTeamRole.Arn
      Environment:
        Variables:
          ARTIFACT_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          BEDROCK_ROLE_ARN: !Ref BedrockAgentServiceRoleArn
          SCAN_DIR: /var/task/config/examples
          ROLES_PATH: /var/task/config/examples/roles.json
          DEPTS_PATH: /var/task/config/examples/departments.json
          OUTPUT_PREFIX: teams
          FOUNDATION_MODEL: amazon.nova-micro-v1:0

  SamDeployerStateMachinePermissions:
    Type: AWS::IAM::RolePolicy
    Condition: HasSamDeployerRoleName
    Properties:
      RoleName: !Ref SamDeployerRoleName
      PolicyName: !Sub "${AWS::StackName}-sam-deployer-stepfunctions"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowStateMachineManagement
            Effect: Allow
            Action:
              - states:CreateStateMachine
              - states:UpdateStateMachine
              - states:DeleteStateMachine
              - states:DescribeStateMachine
              - states:TagResource
              - states:UntagResource
            Resource:
              - !Sub "arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:*"
          - Sid: AllowStateMachineDiscovery
            Effect: Allow
            Action:
              - states:ListStateMachines
            Resource: "*"
          - Sid: AllowGetRolePolicyForCfnDriftChecks
            Effect: Allow
            Action:
              - iam:GetRolePolicy
            Resource:
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${SamDeployerRoleName}"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-trigger-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-status-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-worker-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-provision-team-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-stepfunctions-role"

  SamAssumeRoleS3TeamUploadPermissions:
    Type: AWS::IAM::RolePolicy
    Condition: HasSamAssumeRoleName
    Properties:
      RoleName: !Ref SamAssumeRoleName
      PolicyName: !Sub "${AWS::StackName}-s3-team-upload"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !If
                - CreateConfigBucket
                - !GetAtt TeamConfigBucket.Arn
                - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
              - !If
                - CreateConfigBucket
                - !Sub "${TeamConfigBucket.Arn}/*"
                - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"

  StateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${AWS::StackName}-state-machine"
      # ASSUMPTION: Express workflow is required for low-latency polling and high-throughput invocation.
      StateMachineType: EXPRESS
      RoleArn: !GetAtt StepFunctionsRole.Arn
      LoggingConfiguration:
        Level: ERROR
        IncludeExecutionData: false
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn
      DefinitionString: !Sub |
        {
          "StartAt": "InvokeWorker",
          "States": {
            "InvokeWorker": {
              "Type": "Task",
              "Resource": "arn:${AWS::Partition}:states:::lambda:invoke",
              "OutputPath": "$.Payload",
              "Parameters": {
                "FunctionName": "${WorkerFunction.Arn}",
                "Payload.$": "$"
              },
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "ResultPath": "$.error",
                  "Next": "WorkflowFailed"
                }
              ],
              "End": true
            },
            "WorkflowFailed": {
              "Type": "Fail",
              "Error": "WorkflowFailed",
              "Cause": "Worker task failed"
            }
          }
        }

  OrchestratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasVpcConfig
    Properties:
      GroupDescription: Lambda security group for outbound PostgreSQL access to RDS
      VpcId: !Ref VpcId

  OrchestratorToRdsEgress5432:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref OrchestratorSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RdsSecurityGroupId

  OrchestratorToAwsServicesEgress443:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref OrchestratorSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: "0.0.0.0/0"

  RdsIngressFromOrchestrator5432:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref RdsSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref OrchestratorSecurityGroup

  TeamWeaveApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${TeamWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  StateMachineArn:
    Value: !Ref StateMachine
  TriggerFunctionArn:
    Value: !GetAtt TriggerFunction.Arn
  StatusFunctionArn:
    Value: !GetAtt StatusFunction.Arn
  WorkerFunctionArn:
    Value: !GetAtt WorkerFunction.Arn
  ProvisionTeamFunctionArn:
    Value: !GetAtt ProvisionTeamFunction.Arn
  WorkerRoleArn:
    Value: !GetAtt WorkerRole.Arn
  DdbTable:
    Value: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
  ConfigBucket:
    Value: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
  ArtifactBucket:
    Value: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
