AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bedrock multi-agent teams + personal improvement tasks (config-driven)

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        # W3660: CorsGatewayResponseDefault4XX and CorsGatewayResponseDefault5XX are
        # intentionally separate AWS::ApiGateway::GatewayResponse resources. They add
        # CORS headers to gateway-level error responses (auth failures, WAF blocks,
        # throttling) that the inline Cors setting on TeamWeaveApi does not cover.
        # These resources are complementary to the API Body, not conflicting with it.
        - W3660

Parameters:
  ConfigBucketName:
    Type: String
    Default: ""
    Description: S3 bucket that holds team configs (teams/{TEAM}/{VERSION}/team.json)
  ArtifactBucketName:
    Type: String
    Default: ""
    Description: S3 bucket for run artifacts (runs/{run_id}/{step_id}.json)
  TeamConfigPrefix:
    Type: String
    Default: teams
    Description: "Prefix in config bucket for team configs (default: teams)"
  VectorDbTable:
    Type: String
    Default: "rag_chunks"
    Description: Vector store collection/table identifier (used for explicit RAG mode)
  VectorDbHost:
    Type: String
    Default: "resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com"
    Description: PostgreSQL host for explicit RAG mode (pgvector)
  VectorDbPort:
    Type: String
    Default: "5432"
    Description: PostgreSQL port for explicit RAG mode
  VectorDbName:
    Type: String
    Default: "postgres"
    Description: PostgreSQL database name for explicit RAG mode
  VectorDbUser:
    Type: String
    Default: "masteruser"
    Description: PostgreSQL username for explicit RAG mode
  VectorDbPassword:
    Type: String
    NoEcho: true
    Default: "YourStrongPassword123!"
    Description: PostgreSQL password for explicit RAG mode
  VectorDbUrl:
    Type: String
    NoEcho: true
    Default: "postgresql://masteruser:YourStrongPassword123!@resume-rag-db.cplgkqp9qd3a.us-east-1.rds.amazonaws.com:5432/postgres"
    Description: Full PostgreSQL connection URL. When set, this overrides host/port/name/user/password parameters.
  GeminiSecretArn:
    Type: String
    Default: ""
    Description: (Optional) Secrets Manager ARN storing Gemini API key JSON (e.g. {"key":"..."})
  DdbTableName:
    Type: String
    Default: ""
    Description: Optional. Leave blank to create a new DynamoDB table.
  VpcId:
    Type: String
    Default: "vpc-f3c92a8a"
    Description: VPC ID for Lambda networking to RDS.
  LambdaSubnetIds:
    Type: String
    Default: ""
    Description: Comma-separated private subnet IDs for Lambda ENIs (required for VPC connectivity).
  RdsSecurityGroupId:
    Type: String
    Default: "sg-06e6751625773c1bf"
    Description: RDS security group ID (resume-rag-sg) to allow PostgreSQL traffic from Lambda.
  SamDeployerRoleName:
    Type: String
    Default: ""
    Description: Optional IAM role name used by CI/CD for SAM deployment. When set, stack creation grants Step Functions deployment permissions to this role.
  SamAssumeRoleName:
    Type: String
    Default: ""
    Description: Optional IAM role name assumed during `sam deploy` that needs S3 team config upload permissions.
  BedrockAgentServiceRoleArn:
    Type: String
    Default: "arn:aws:iam::239571291755:role/BedrockAgentServiceRole-Tarun"
    Description: IAM role ARN passed to Bedrock CreateAgent as AgentResourceRoleArn.
  AmpWorkspaceAlias:
    Type: String
    Default: ""
    Description: Optional alias for the AMP workspace. Defaults to {StackName}-observatory.
  AllowedCorsOrigin:
    Type: String
    Default: "'*'"
    Description: "Allowed CORS origin for the API Gateway (e.g. 'https://app.example.com'). Use '*' to allow all origins including Lambda invocations."
  EnableWAF:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set to 'true' to deploy a WAF WebACL with AWS managed rule sets and attach it to the API Gateway stage.
  PrivateRouteTableId:
    Type: String
    Default: ""
    Description: Route table ID for private subnets. Required to associate S3 and DynamoDB Gateway VPC endpoints.
  EgressOnlyInternetGatewayId:
    Type: String
    Default: ""
    Description: >
      Egress-Only Internet Gateway ID attached to the VPC. When provided together with
      PrivateRouteTableId, a ::/0 IPv6 route is added so Lambda can reach AWS public
      endpoints (Bedrock, Secrets Manager, AMP) via IPv6 instead of a NAT Gateway,
      eliminating NAT data-processing charges for those calls.
  SiweAuthorizerFunctionArn:
    Type: String
    Default: ""
    Description: ARN of the SIWE Lambda authorizer function exported from the siwe-infra CloudFormation stack (AuthorizerFunctionArn output).

Conditions:
  HasAmpWorkspaceAlias: !Not [!Equals [!Ref AmpWorkspaceAlias, ""]]
  CreateConfigBucket: !Equals [!Ref ConfigBucketName, ""]
  CreateArtifactBucket: !Equals [!Ref ArtifactBucketName, ""]
  CreateDdbTable: !Equals [!Ref DdbTableName, ""]
  HasGeminiSecret: !Not [!Equals [!Ref GeminiSecretArn, ""]]
  HasVpcConfig: !And
    - !Not [!Equals [!Ref VpcId, ""]]
    - !Not [!Equals [!Ref RdsSecurityGroupId, ""]]
    - !Not [!Equals [!Ref LambdaSubnetIds, ""]]
  HasSamDeployerRoleName: !Not [!Equals [!Ref SamDeployerRoleName, ""]]
  HasSamAssumeRoleName: !Not [!Equals [!Ref SamAssumeRoleName, ""]]
  DeployWAF: !Equals [!Ref EnableWAF, "true"]
  HasPrivateRouteTable: !And
    - !Not [!Equals [!Ref PrivateRouteTableId, ""]]
    - !Not [!Equals [!Ref VpcId, ""]]
  HasEigw: !Not [!Equals [!Ref EgressOnlyInternetGatewayId, ""]]
  HasPrivateRouteTableAndEigw: !And
    - !Not [!Equals [!Ref PrivateRouteTableId, ""]]
    - !Not [!Equals [!Ref VpcId, ""]]
    - !Not [!Equals [!Ref EgressOnlyInternetGatewayId, ""]]
  HasSiweAuthorizer: !Not [!Equals [!Ref SiweAuthorizerFunctionArn, ""]]

Globals:
  Function:
    Runtime: python3.12
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  VectorDbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/vector-db-credentials"
      Description: PostgreSQL credentials for the TeamWeave RDS instance
      SecretString: !Sub |
        {
          "host": "${VectorDbHost}",
          "port": "${VectorDbPort}",
          "dbname": "${VectorDbName}",
          "username": "${VectorDbUser}",
          "password": "${VectorDbPassword}",
          "url": "${VectorDbUrl}"
        }

  TeamConfigBucket:
    Type: AWS::S3::Bucket
    Condition: CreateConfigBucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  TeamArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: CreateArtifactBucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionAndExpireArtifacts
            Status: Enabled
            Prefix: runs/
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
            ExpirationInDays: 365

  ContentPipelineRunsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateDdbTable
    Properties:
      TableName: !Sub "${AWS::StackName}-CONTENT_PIPELINE_RUNS"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  ObservatoryMetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-OBSERVATORY_METRICS"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  AMPWorkspace:
    Type: AWS::APS::Workspace
    Properties:
      Alias: !If
        - HasAmpWorkspaceAlias
        - !Ref AmpWorkspaceAlias
        - !Sub "${AWS::StackName}-observatory"
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-worker-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: worker-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action: [s3:GetObject]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action: [s3:PutObject]
                Resource: !If
                  - CreateArtifactBucket
                  - !Sub "${TeamArtifactBucket.Arn}/*"
                  - !Sub "arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !If [CreateDdbTable, !GetAtt ContentPipelineRunsTable.Arn, !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DdbTableName}"]
                  - !If [CreateDdbTable, !Sub "${ContentPipelineRunsTable.Arn}/index/*", !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DdbTableName}/index/*"]
                  - !GetAtt ObservatoryMetricsTable.Arn
                  - !Sub "${ObservatoryMetricsTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt ProvisionTeamFunction.Arn
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock-agent-runtime:InvokeAgent
                Resource:
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:custom-model/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:imported-model/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:provisioned-model/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt ProvisionTeamFunction.Arn
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-bedrock-agent-service-role"
              - !If
                - HasGeminiSecret
                - Effect: Allow
                  Action: [secretsmanager:GetSecretValue]
                  Resource: !Ref GeminiSecretArn
                - !Ref "AWS::NoValue"
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !Ref VectorDbSecret
              - Effect: Allow
                Action:
                  - aps:RemoteWrite
                Resource: !GetAtt AMPWorkspace.Arn

  TriggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-trigger-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: trigger-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"
              - Effect: Allow
                Action:
                  - states:StartExecution
                  - sfn:StartExecution
                Resource: !Ref StateMachine
              - !If
                - HasVpcConfig
                - Effect: Allow
                  Action:
                    - ec2:CreateNetworkInterface
                    - ec2:DescribeNetworkInterfaces
                    - ec2:DeleteNetworkInterface
                    - ec2:AssignPrivateIpAddresses
                    - ec2:UnassignPrivateIpAddresses
                  Resource: "*"
                - !Ref AWS::NoValue
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action: [s3:GetObject]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !If [CreateDdbTable, !GetAtt ContentPipelineRunsTable.Arn, !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DdbTableName}"]
                  - !If [CreateDdbTable, !Sub "${ContentPipelineRunsTable.Arn}/index/*", !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DdbTableName}/index/*"]
                  - !GetAtt ObservatoryMetricsTable.Arn
                  - !Sub "${ObservatoryMetricsTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt ProvisionTeamFunction.Arn
              - Effect: Allow
                Action:
                  - aps:QueryMetrics
                  - aps:GetLabels
                  - aps:GetSeries
                  - aps:GetMetricMetadata
                Resource: !GetAtt AMPWorkspace.Arn
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !Ref VectorDbSecret

  StatusRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-status-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: status-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - states:DescribeExecution
                  - sfn:DescribeExecution
                Resource:
                  - !Sub "${StateMachine}:*"

  ProvisionTeamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-provision-team-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: provision-team-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !GetAtt TeamConfigBucket.Arn
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !If
                    - CreateConfigBucket
                    - !Sub "${TeamConfigBucket.Arn}/*"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"
                  - !If
                    - CreateConfigBucket
                    - !Ref "AWS::NoValue"
                    - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}-*/*"
              - Effect: Allow
                Action:
                  - bedrock:ListAgents
                  - bedrock:GetAgent
                  - bedrock:CreateAgent
                  - bedrock:UpdateAgent
                  - bedrock:PrepareAgent
                  - bedrock:CreateAgentAlias
                  - bedrock:ListAgentAliases
                  - bedrock:DeleteAgent
                  - bedrock:DeleteAgentAlias
                  - bedrock:TagResource
                  - bedrock:UntagResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Ref BedrockAgentServiceRoleArn

  ObservatoryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-observatory-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: observatory-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - aps:QueryMetrics
                  - aps:GetLabels
                  - aps:GetSeries
                  - aps:GetMetricMetadata
                Resource: !GetAtt AMPWorkspace.Arn

  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-stepfunctions-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-worker
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt WorkerFunction.Arn
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"
              # Log delivery control-plane actions require Resource: "*" (AWS constraint)
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"

  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${AWS::StackName}-state-machine"
      RetentionInDays: 30

  TriggerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-TriggerFunction"
      RetentionInDays: 30

  WorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-WorkerFunction"
      RetentionInDays: 30

  StatusFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-StatusFunction"
      RetentionInDays: 30

  ProvisionTeamFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-ProvisionTeamFunction"
      RetentionInDays: 30

  ObservatoryMetricsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-ObservatoryMetricsFunction"
      RetentionInDays: 30

  GeminiResearchFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # GeminiResearchFunction has explicit FunctionName: pbm-gemini-research
      LogGroupName: /aws/lambda/pbm-gemini-research
      RetentionInDays: 30

  TriggerFunction:
    Type: AWS::Serverless::Function
    DependsOn: TriggerFunctionLogGroup
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/trigger_handler.handler
      Role: !GetAtt TriggerRole.Arn
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: 60
      Events:
        TeamTaskEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /team/task
            Method: post
        ImproveTasksEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/tasks
            Method: get
        ImproveTaskDoneEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /improve/task/done
            Method: post
        AgentsPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents
            Method: post
        AgentsGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents
            Method: get
        AgentsDeleteEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents
            Method: delete
        AgentByNameGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents/{name}
            Method: get
            RequestParameters:
              - method.request.path.name:
                  Required: true
                  Caching: false
        AgentByNamePutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /agents/{name}
            Method: put
            RequestParameters:
              - method.request.path.name:
                  Required: true
                  Caching: false
        TeamsGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams
            Method: get
        TeamsPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams
            Method: post
        TeamByNameGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/{team_name}
            Method: get
            RequestParameters:
              - method.request.path.team_name:
                  Required: true
                  Caching: false
        TeamByNamePutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/{team_name}
            Method: put
            RequestParameters:
              - method.request.path.team_name:
                  Required: true
                  Caching: false
        TeamByNameDeleteEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/{team_name}
            Method: delete
            RequestParameters:
              - method.request.path.team_name:
                  Required: true
                  Caching: false
        RolesGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles
            Method: get
        RolesPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles
            Method: post
        RoleByIdGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles/{role_id}
            Method: get
            RequestParameters:
              - method.request.path.role_id:
                  Required: true
                  Caching: false
        RoleByIdPutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /roles/{role_id}
            Method: put
            RequestParameters:
              - method.request.path.role_id:
                  Required: true
                  Caching: false
        DepartmentsGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments
            Method: get
        DepartmentsPostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments
            Method: post
        DepartmentByIdGetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments/{dept_id}
            Method: get
            RequestParameters:
              - method.request.path.dept_id:
                  Required: true
                  Caching: false
        DepartmentByIdPutEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /departments/{dept_id}
            Method: put
            RequestParameters:
              - method.request.path.dept_id:
                  Required: true
                  Caching: false
      Environment:
        Variables:
          CONFIG_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          CONFIG_PREFIX: !Ref TeamConfigPrefix
          ARTIFACT_BUCKET: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
          DDB_TABLE: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
          VECTOR_DB_TABLE: !Ref VectorDbTable
          VECTOR_DB_HOST: !Ref VectorDbHost
          VECTOR_DB_PORT: !Ref VectorDbPort
          VECTOR_DB_NAME: !Ref VectorDbName
          VECTOR_DB_USER: !Ref VectorDbUser
          # VECTOR_DB_PASSWORD and VECTOR_DB_URL removed; fetch at runtime via VECTOR_DB_SECRET_ARN
          VECTOR_DB_SECRET_ARN: !Ref VectorDbSecret
          VECTOR_DB_SSLMODE: verify-full
          VECTOR_DB_SSL_ROOT_CERT: /var/task/certs/rds-ca-bundle.pem
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_MODEL: gemini-2.0-flash
          STATE_MACHINE_ARN: !Ref StateMachine
          PROVISION_FUNCTION_NAME: !Ref ProvisionTeamFunction
          OBSERVATORY_METRICS_TABLE: !Ref ObservatoryMetricsTable
          AMP_WORKSPACE_ID: !GetAtt AMPWorkspace.WorkspaceId
          AMP_REGION: !Ref AWS::Region
      VpcConfig: !If
        - HasVpcConfig
        - SecurityGroupIds:
            - !Ref OrchestratorSecurityGroup
          SubnetIds: !Split [",", !Ref LambdaSubnetIds]
        - !Ref AWS::NoValue

  WorkerFunction:
    Type: AWS::Serverless::Function
    DependsOn: WorkerFunctionLogGroup
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/worker_handler.handler
      Role: !GetAtt WorkerRole.Arn
      Architectures:
        - arm64
      MemorySize: 1024
      Timeout: 300
      Environment:
        Variables:
          CONFIG_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          CONFIG_PREFIX: !Ref TeamConfigPrefix
          ARTIFACT_BUCKET: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
          DDB_TABLE: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
          VECTOR_DB_TABLE: !Ref VectorDbTable
          VECTOR_DB_HOST: !Ref VectorDbHost
          VECTOR_DB_PORT: !Ref VectorDbPort
          VECTOR_DB_NAME: !Ref VectorDbName
          VECTOR_DB_USER: !Ref VectorDbUser
          # VECTOR_DB_PASSWORD and VECTOR_DB_URL removed; fetch at runtime via VECTOR_DB_SECRET_ARN
          VECTOR_DB_SECRET_ARN: !Ref VectorDbSecret
          VECTOR_DB_SSLMODE: verify-full
          VECTOR_DB_SSL_ROOT_CERT: /var/task/certs/rds-ca-bundle.pem
          GEMINI_SECRET_ARN: !Ref GeminiSecretArn
          GEMINI_MODEL: gemini-2.0-flash
          GEMINI_LAMBDA_ARN: !GetAtt GeminiResearchFunction.Arn
          PROVISION_FUNCTION_NAME: !Ref ProvisionTeamFunction
          OBSERVATORY_METRICS_TABLE: !Ref ObservatoryMetricsTable
          AMP_WORKSPACE_ID: !GetAtt AMPWorkspace.WorkspaceId
          AMP_REGION: !Ref AWS::Region
      VpcConfig: !If
        - HasVpcConfig
        - SecurityGroupIds:
            - !Ref OrchestratorSecurityGroup
          SubnetIds: !Split [",", !Ref LambdaSubnetIds]
        - !Ref AWS::NoValue

  GeminiResearchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-gemini-research-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: gemini-research-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gemini/api_key-*"

  GeminiResearchFunction:
    Type: AWS::Serverless::Function
    DependsOn: GeminiResearchFunctionLogGroup
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: pbm-gemini-research
      CodeUri: ../
      Handler: config/examples/gemini_lambda.handler
      Role: !GetAtt GeminiResearchRole.Arn
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: 60
      Environment:
        Variables:
          GEMINI_MODEL: gemini-2.0-flash
          MAX_TOKENS: "1024"

  GeminiResearchFunctionInvokePermissionForBedrock:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GeminiResearchFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"

  ObservatoryMetricsFunction:
    Type: AWS::Serverless::Function
    DependsOn: ObservatoryMetricsFunctionLogGroup
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/observatory_handler.handler
      Role: !GetAtt ObservatoryRole.Arn
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          AMP_WORKSPACE_ID: !GetAtt AMPWorkspace.WorkspaceId
          AMP_REGION: !Ref AWS::Region
      Events:
        ObservatoryMetricsGet:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /observability/metrics
            Method: get

  StatusFunction:
    Type: AWS::Serverless::Function
    DependsOn: StatusFunctionLogGroup
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: src/orchestrator/status_handler.handler
      Role: !GetAtt StatusRole.Arn
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref StateMachine
      Events:
        TeamTaskStatusEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /team/task/{run_id}
            Method: get
            RequestParameters:
              - method.request.path.run_id:
                  Required: true
                  Caching: false
        TeamsTaskStatusEvent:
          Type: Api
          Properties:
            RestApiId: !Ref TeamWeaveApi
            Path: /teams/task/{run_id}
            Method: get
            RequestParameters:
              - method.request.path.run_id:
                  Required: true
                  Caching: false


  ProvisionTeamFunction:
    Type: AWS::Serverless::Function
    DependsOn: ProvisionTeamFunctionLogGroup
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: config/examples/lambda_handler.handler
      Role: !GetAtt ProvisionTeamRole.Arn
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          ARTIFACT_BUCKET: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
          BEDROCK_ROLE_ARN: !Ref BedrockAgentServiceRoleArn
          SCAN_DIR: /var/task/config/examples
          ROLES_PATH: /var/task/config/examples/roles.json
          DEPTS_PATH: /var/task/config/examples/departments.json
          OUTPUT_PREFIX: teams
          FOUNDATION_MODEL: amazon.nova-micro-v1:0

  SamDeployerStateMachinePermissions:
    Type: AWS::IAM::RolePolicy
    Condition: HasSamDeployerRoleName
    Properties:
      RoleName: !Ref SamDeployerRoleName
      PolicyName: !Sub "${AWS::StackName}-sam-deployer-stepfunctions"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowStateMachineManagement
            Effect: Allow
            Action:
              - states:CreateStateMachine
              - states:UpdateStateMachine
              - states:DeleteStateMachine
              - states:DescribeStateMachine
              - states:TagResource
              - states:UntagResource
            Resource:
              - !Sub "arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:*"
          - Sid: AllowStateMachineDiscovery
            Effect: Allow
            Action:
              - states:ListStateMachines
            Resource: "*"
          - Sid: AllowGetRolePolicyForCfnDriftChecks
            Effect: Allow
            Action:
              - iam:GetRolePolicy
            Resource:
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${SamDeployerRoleName}"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-trigger-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-status-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-worker-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-provision-team-role"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-stepfunctions-role"

  SamAssumeRoleS3TeamUploadPermissions:
    Type: AWS::IAM::RolePolicy
    Condition: HasSamAssumeRoleName
    Properties:
      RoleName: !Ref SamAssumeRoleName
      PolicyName: !Sub "${AWS::StackName}-s3-team-upload"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !If
                - CreateConfigBucket
                - !GetAtt TeamConfigBucket.Arn
                - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}"
              - !If
                - CreateConfigBucket
                - !Sub "${TeamConfigBucket.Arn}/*"
                - !Sub "arn:${AWS::Partition}:s3:::${ConfigBucketName}/*"

  StateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${AWS::StackName}-state-machine"
      StateMachineType: STANDARD
      RoleArn: !GetAtt StepFunctionsRole.Arn
      LoggingConfiguration:
        Level: ERROR
        IncludeExecutionData: false
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn
      DefinitionString: !Sub |
        {
          "StartAt": "InvokeWorker",
          "States": {
            "InvokeWorker": {
              "Type": "Task",
              "Resource": "arn:${AWS::Partition}:states:::lambda:invoke",
              "OutputPath": "$.Payload",
              "Parameters": {
                "FunctionName": "${WorkerFunction.Arn}",
                "Payload.$": "$"
              },
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "ResultPath": "$.error",
                  "Next": "WorkflowFailed"
                }
              ],
              "End": true
            },
            "WorkflowFailed": {
              "Type": "Fail",
              "Error": "WorkflowFailed",
              "Cause": "Worker task failed"
            }
          }
        }

  OrchestratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasVpcConfig
    Properties:
      GroupDescription: Lambda security group for outbound PostgreSQL access to RDS
      VpcId: !Ref VpcId

  OrchestratorToRdsEgress5432:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref OrchestratorSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RdsSecurityGroupId

  OrchestratorToAwsServicesEgress443:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref OrchestratorSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: "0.0.0.0/0"

  # IPv6 egress: Lambda → AWS public endpoints via EIGW (no NAT Gateway required).
  # Covers Bedrock, Secrets Manager, AMP, and other dual-stack AWS services.
  OrchestratorToAwsServicesEgressIPv6443:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref OrchestratorSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIpv6: "::/0"

  # Route ::/0 IPv6 traffic to the Egress-Only Internet Gateway so Lambda ENIs
  # in the dual-stack private subnet can reach AWS public APIs without a NAT Gateway.
  # EIGW is stateful and blocks all unsolicited inbound connections.
  Ipv6RouteToEigw:
    Type: AWS::EC2::Route
    Condition: HasPrivateRouteTableAndEigw
    Properties:
      RouteTableId: !Ref PrivateRouteTableId
      DestinationIpv6CidrBlock: "::/0"
      EgressOnlyInternetGatewayId: !Ref EgressOnlyInternetGatewayId

  RdsIngressFromOrchestrator5432:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasVpcConfig
    Properties:
      GroupId: !Ref RdsSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref OrchestratorSecurityGroup

  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasPrivateRouteTable
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableId

  DynamoDbVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasPrivateRouteTable
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.dynamodb"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableId

  # NOTE: Bedrock Interface VPC endpoints removed for cost savings (~$14-21/month).
  # Bedrock Runtime and Bedrock Agent Runtime traffic routes via IPv6 EIGW (dual-stack
  # subnets) at no data-processing cost. The OrchestratorToAwsServicesEgress443 rule
  # (0.0.0.0/0 IPv4) provides fallback for any non-dual-stack paths.
  # Gateway endpoints (S3, DynamoDB) are retained — they are free and keep that
  # traffic within the AWS network.

  SiweAuthorizerInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasSiweAuthorizer
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SiweAuthorizerFunctionArn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${TeamWeaveApi}/authorizers/*"

  TeamWeaveWAF:
    Type: AWS::WAFv2::WebACL
    Condition: DeployWAF
    Properties:
      Name: !Sub "${AWS::StackName}-waf"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-common-rules"
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-bad-inputs"
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-waf"

  TeamWeaveWAFAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: DeployWAF
    Properties:
      ResourceArn: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${TeamWeaveApi}/stages/prod"
      WebACLArn: !GetAtt TeamWeaveWAF.Arn

  # GatewayResponse resources add CORS headers to 4xx/5xx responses that API Gateway
  # generates itself (e.g. 401 from the Lambda authorizer, 403 WAF block, 429 throttle).
  # Without these, auth failures return no Access-Control-Allow-Origin header and
  # browsers report the error as a CORS failure, masking the real cause.
  CorsGatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Ref AllowedCorsOrigin
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,x-api-key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,DELETE'"
      ResponseType: DEFAULT_4XX
      RestApiId: !Ref TeamWeaveApi

  CorsGatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Ref AllowedCorsOrigin
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,x-api-key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,DELETE'"
      ResponseType: DEFAULT_5XX
      RestApiId: !Ref TeamWeaveApi

  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  ApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}/access-logs"
      RetentionInDays: 30

  TeamWeaveApi:
    Type: AWS::Serverless::Api
    DependsOn: ApiGatewayAccount
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: SiweAuthorizer
        # Allow OPTIONS preflight requests to pass through without invoking the authorizer.
        # Without this, browsers' CORS preflight requests are rejected with 401 before
        # reaching the Lambda, breaking all cross-origin calls.
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          SiweAuthorizer:
            FunctionArn: !Ref SiweAuthorizerFunctionArn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300
      Cors:
        AllowOrigin: !Ref AllowedCorsOrigin
        AllowHeaders: "'Content-Type,Authorization,x-api-key'"
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency","responseLatency":"$context.responseLatency"}'
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: false
          MetricsEnabled: true

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${TeamWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  StateMachineArn:
    Value: !Ref StateMachine
  TriggerFunctionArn:
    Value: !GetAtt TriggerFunction.Arn
  StatusFunctionArn:
    Value: !GetAtt StatusFunction.Arn
  WorkerFunctionArn:
    Value: !GetAtt WorkerFunction.Arn
  ProvisionTeamFunctionArn:
    Value: !GetAtt ProvisionTeamFunction.Arn
  GeminiResearchFunctionArn:
    Value: !GetAtt GeminiResearchFunction.Arn
  WorkerRoleArn:
    Value: !GetAtt WorkerRole.Arn
  DdbTable:
    Value: !If [CreateDdbTable, !Ref ContentPipelineRunsTable, !Ref DdbTableName]
  ConfigBucket:
    Value: !If [CreateConfigBucket, !Ref TeamConfigBucket, !Ref ConfigBucketName]
  ArtifactBucket:
    Value: !If [CreateArtifactBucket, !Ref TeamArtifactBucket, !Ref ArtifactBucketName]
  ObservatoryMetricsTable:
    Value: !Ref ObservatoryMetricsTable
  AMPWorkspaceArn:
    Value: !GetAtt AMPWorkspace.Arn
  AMPWorkspaceId:
    Value: !GetAtt AMPWorkspace.WorkspaceId
  ObservatoryMetricsFunctionArn:
    Value: !GetAtt ObservatoryMetricsFunction.Arn
  VectorDbSecretArn:
    Value: !Ref VectorDbSecret
    Description: ARN of the Secrets Manager secret holding RDS credentials
  TeamWeaveWAFArn:
    Condition: DeployWAF
    Value: !GetAtt TeamWeaveWAF.Arn
  ApiGatewayAccessLogGroupArn:
    Value: !GetAtt ApiGatewayAccessLogGroup.Arn
    Description: CloudWatch Log Group ARN for API Gateway access logs
  Ipv6EgressEnabled:
    Value: !If [HasPrivateRouteTableAndEigw, "true", "false"]
    Description: Whether a ::/0 IPv6 route to the Egress-Only Internet Gateway is active (dual-stack cost saving mode)
