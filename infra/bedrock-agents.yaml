    Properties:
      AgentId: !Ref VisibilityDirectorAgent
      AgentAliasName: production
      Description: Production alias for tarun_visibility_team director
      Tags:
        team: tarun_visibility_team
        role: director
        env: prod

  ImprovementCoachAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref ImprovementCoachAgent
      AgentAliasName: production
      Description: Production alias for tarun_improvement_team coach
      Tags:
        team: tarun_improvement_team
        role: coach
        env: prod

  SamDeployerBedrockAgentProvisionPermissions:
    Type: AWS::IAM::RolePolicy
    Condition: HasSamAssumeRoleName
    Properties:
      RoleName: !Ref SamAssumeRoleName
      PolicyName: !Sub "${AWS::StackName}-bedrock-agent-provision"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - bedrock:CreateAgent
              - bedrock:PrepareAgent
              - bedrock:GetAgent
              - bedrock:ListAgents
              - bedrock:CreateAgentAlias
              - bedrock:ListAgentAliases
              - bedrock:TagResource
              - iam:PassRole
            Resource: "*"

