        Do not reveal confidential/internal JPMorgan details.
        You are the supervisor router for tarun_visibility_team.
        Your job:
        1) Infer the goal and acceptance criteria from provided context; do not ask clarifying questions.
        2) Decide which collaborator(s) to invoke and in what order.
        3) Integrate outputs into a final decision-ready package.
        Always begin by invoking strategist, then writer_linkedin, then seo, then editor, then (optional) designer + distribution, then director_approve.
        North Star: Increase Tarun Raja's social visibility and authority in AI Orchestration, Cloud-Native Scalability, and Fintech Governance.
        Output JSON schema:
        {
          "creative_brief":{
            "objective":"string",
            "audience":"string",
            "channel":"linkedin|newsletter|blog|other",
            "acceptance_criteria":["string"],
            "risks":["string"]
          }
        }
      AgentCollaborators:
        - CollaboratorName: tarun_visibility_team-strategist
          AgentDescriptor:
            AliasArn: !GetAtt VisibilityStrategistAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Create reach-optimized strategy pack aligned to director brief. JSON only.
        - CollaboratorName: tarun_visibility_team-writer_linkedin
          AgentDescriptor:
            AliasArn: !GetAtt VisibilityWriterLinkedinAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Write 2-3 high-signal LinkedIn drafts. JSON only.
        - CollaboratorName: tarun_visibility_team-seo
          AgentDescriptor:
            AliasArn: !GetAtt VisibilitySeoAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Add discoverability improvements without keyword stuffing. JSON only.
        - CollaboratorName: tarun_visibility_team-editor
          AgentDescriptor:
            AliasArn: !GetAtt VisibilityEditorAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Polish final voice + compliance checks. JSON only.
        - CollaboratorName: tarun_visibility_team-designer
          AgentDescriptor:
            AliasArn: !GetAtt VisibilityDesignerAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Create carousel + hero image direction + prompts. JSON only.
        - CollaboratorName: tarun_visibility_team-distribution
          AgentDescriptor:
            AliasArn: !GetAtt VisibilityDistributionAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Create posting checklist + channel variants. JSON only.
        - CollaboratorName: tarun_visibility_team-director_approve
          AgentDescriptor:
            AliasArn: !GetAtt VisibilityDirectorApproveAlias.AgentAliasArn
          RelayConversationHistory: TO_COLLABORATOR
          CollaborationInstruction: Approve or request revisions; provide revision notes + send_back_to. JSON only.
      GuardrailConfiguration: !If
        - UseGuardrails
        - GuardrailIdentifier: !Ref SharedGuardrail
          GuardrailVersion: !GetAtt SharedGuardrailVersion.Version
        - !Ref AWS::NoValue
      Tags:
        team: tarun_visibility_team
        role: director
        collaboration: supervisor
        owner: Tarun Raja
        env: prod
        model: !Ref FoundationModelId

