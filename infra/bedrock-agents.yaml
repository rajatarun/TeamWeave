AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Amazon Bedrock multi-agent collaboration for tarun_visibility_team and
  tarun_improvement_team with a shared guardrail.

Parameters:
  FoundationModelId:
    Type: String
    Default: amazon.nova-micro-v1:0
    Description: Foundation model ID used by all Bedrock agents.

  AgentServiceRoleArn:
    Type: String
    Default: ""
    Description: Optional existing IAM role ARN for Bedrock agents. If empty, this stack creates and uses its own role.

  SamAssumeRoleName:
    Type: String
    Default: ""
    Description: Optional IAM role name assumed during `sam deploy` that needs Bedrock agent provisioning permissions.

  EnableGuardrails:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Whether to apply shared Bedrock guardrails to agents.

  CollaboratorAgentCollaborationMode:
    Type: String
    Default: DISABLED
    AllowedValues:
      - DISABLED
    Description: Collaboration mode for non-supervisor agents.

  VisibilitySupervisorCollaborationMode:
    Type: String
    Default: SUPERVISOR_ROUTER
    AllowedValues:
      - SUPERVISOR_ROUTER
    Description: Collaboration mode for tarun_visibility_team director supervisor.

  ImprovementSupervisorCollaborationMode:
    Type: String
    Default: SUPERVISOR_ROUTER
    AllowedValues:
      - SUPERVISOR_ROUTER
    Description: Collaboration mode for tarun_improvement_team coach supervisor.

Conditions:
  UseGuardrails: !Equals [!Ref EnableGuardrails, "true"]
  UseProvidedAgentServiceRoleArn: !Not [!Equals [!Ref AgentServiceRoleArn, ""]]
  CreateBedrockAgentServiceRole: !Equals [!Ref AgentServiceRoleArn, ""]
  HasSamAssumeRoleName: !Not [!Equals [!Ref SamAssumeRoleName, ""]]

Resources:
  BedrockAgentServiceRole:
    Type: AWS::IAM::Role
    Condition: CreateBedrockAgentServiceRole
    Properties:
      RoleName: !Sub "${AWS::StackName}-bedrock-agent-service-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-agent-service-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeAgent
                  - bedrock:GetAgentAlias
                  - bedrock:ApplyGuardrail
                Resource: "*"

  SharedGuardrail:
    Condition: UseGuardrails
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: tarun-shared-guardrail
      Description: Shared safety + anti-fabrication guardrail for Tarun agents
      BlockedInputMessaging: Please rephrase safely and avoid sensitive content.
      BlockedOutputsMessaging: Output blocked by safety policy. Please revise request.
      ContentPolicyConfig:
        FiltersConfig:
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: SEXUAL
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: VIOLENCE
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: MEDIUM
            OutputStrength: NONE
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: EMAIL
            Action: ANONYMIZE
          - Type: PHONE
            Action: ANONYMIZE
      WordPolicyConfig:
        WordsConfig:
          - Text: malware
          - Text: credential theft

  SharedGuardrailVersion:
    Condition: UseGuardrails
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !Ref SharedGuardrail
      Description: v1 baseline

  VisibilityStrategistAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: tarun_visibility_team-strategist
      AgentResourceRoleArn: !If [UseProvidedAgentServiceRoleArn, !Ref AgentServiceRoleArn, !GetAtt BedrockAgentServiceRole.Arn]
      FoundationModel: !Ref FoundationModelId
      Description: !Sub "tarun_visibility_team strategist using model ${FoundationModelId}."
      AutoPrepare: true
      IdleSessionTTLInSeconds: 1800
      AgentCollaboration: !Ref CollaboratorAgentCollaborationMode
      Instruction: |
        Return ONLY valid JSON. No markdown. No prose outside JSON.
        Do not ask follow-up questions. If inputs are incomplete, make reasonable assumptions and continue.
        Never fabricate facts, numbers, or citations. If uncertain, mark fields as "NEEDS_SOURCE".
        Keep outputs skimmable and action-oriented.
        Do not reveal confidential/internal JPMorgan details.
        North Star: Increase Tarun Raja's social visibility and authority in AI Orchestration, Cloud-Native Scalability, and Fintech Governance.
        Output JSON schema:
        {
          "strategy": {
            "topic": "string",
            "angle": "string",
            "audience": "string",
            "hook_options": ["string"],
            "outline": ["string"],
            "risks": ["string"]
          }
        }
      GuardrailConfiguration: !If
        - UseGuardrails
        - GuardrailIdentifier: !Ref SharedGuardrail
          GuardrailVersion: !GetAtt SharedGuardrailVersion.Version
        - !Ref AWS::NoValue
      Tags:
        team: tarun_visibility_team
        role: strategist
        collaboration: collaborator
        owner: Tarun Raja
        env: prod
        model: !Ref FoundationModelId

