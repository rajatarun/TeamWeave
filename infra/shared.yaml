AWSTemplateFormatVersion: '2010-09-09'
Description: >
  TeamWeave shared infrastructure — Observatory DynamoDB table, Amazon Managed
  Prometheus workspace, and VPC Gateway endpoints (S3 + DynamoDB). Deploy this
  stack once per environment before deploying the main application stack.
  All outputs are exported so they can be consumed by the main stack or other
  stacks in the same region/account.

Parameters:
  VpcId:
    Type: String
    Description: VPC ID used by the TeamWeave application. Required for Gateway VPC endpoints.
  PrivateRouteTableId:
    Type: String
    Default: ""
    Description: >
      Route table ID for private subnets. When provided, free Gateway VPC endpoints for
      S3 and DynamoDB are created so Lambda traffic stays within the AWS network.
  EgressOnlyInternetGatewayId:
    Type: String
    Default: ""
    Description: >
      Deprecated — the stack now creates and owns its Egress-Only Internet Gateway
      automatically whenever VpcId is set. This parameter is retained for backward
      compatibility only and is no longer used.
  AmpWorkspaceAlias:
    Type: String
    Default: ""
    Description: Optional alias for the AMP workspace. Defaults to {StackName}-observatory.
  LambdaSubnetCidrAz1:
    Type: String
    Default: "172.31.96.0/24"
    Description: >
      IPv4 CIDR for the first Lambda private subnet (AZ index 0). Must be within the VPC
      CIDR and must not overlap with existing subnets.
  LambdaSubnetCidrAz2:
    Type: String
    Default: "172.31.97.0/24"
    Description: >
      IPv4 CIDR for the second Lambda private subnet (AZ index 1). Must be within the VPC
      CIDR and must not overlap with existing subnets.
  VpcIpv6Block:
    Type: String
    Default: ""
    Description: >
      Amazon-provided IPv6 /56 CIDR block assigned to the VPC (e.g. 2600:1f18:abcd:ef00::/56).
      On the first deploy this is left empty — the VpcIpv6CidrBlock resource below requests
      the /56 from AWS. After that deploy, run:
        aws ec2 describe-vpcs --vpc-ids <VPC_ID> --query 'Vpcs[0].Ipv6CidrBlockAssociationSet'
      to find the assigned CIDR, then pass it here on the next deploy so that Lambda subnets
      automatically receive /64 CIDRs and dual-stack is fully enabled.

Conditions:
  HasAmpWorkspaceAlias: !Not [!Equals [!Ref AmpWorkspaceAlias, ""]]
  HasVpc: !Not [!Equals [!Ref VpcId, ""]]
  HasPrivateRouteTable: !And
    - !Not [!Equals [!Ref PrivateRouteTableId, ""]]
    - !Not [!Equals [!Ref VpcId, ""]]
  HasPrivateRouteTableAndEigw: !And
    - !Not [!Equals [!Ref PrivateRouteTableId, ""]]
    - !Not [!Equals [!Ref VpcId, ""]]
    - !Not [!Equals [!Ref EgressOnlyInternetGatewayId, ""]]
  HasVpcIpv6Block: !And
    - !Not [!Equals [!Ref VpcId, ""]]
    - !Not [!Equals [!Ref VpcIpv6Block, ""]]

Resources:

  # ---------------------------------------------------------------------------
  # Observatory telemetry store
  # ---------------------------------------------------------------------------

  ObservatoryMetricsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AWS::StackName}-OBSERVATORY_METRICS"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: AgentIdTimestampIndex
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  # ---------------------------------------------------------------------------
  # Amazon Managed Prometheus workspace
  # ---------------------------------------------------------------------------

  AMPWorkspace:
    Type: AWS::APS::Workspace
    Properties:
      Alias: !If
        - HasAmpWorkspaceAlias
        - !Ref AmpWorkspaceAlias
        - !Sub "${AWS::StackName}-observatory"
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  # ---------------------------------------------------------------------------
  # VPC Gateway endpoints — free, keep S3/DynamoDB traffic off the public internet
  # ---------------------------------------------------------------------------

  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref LambdaRouteTable
        - !If [HasPrivateRouteTable, !Ref PrivateRouteTableId, !Ref "AWS::NoValue"]

  DynamoDbVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.dynamodb"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref LambdaRouteTable
        - !If [HasPrivateRouteTable, !Ref PrivateRouteTableId, !Ref "AWS::NoValue"]

  # ---------------------------------------------------------------------------
  # VPC IPv6 CIDR association — requests an Amazon-provided /56 for the VPC
  # ---------------------------------------------------------------------------
  # Created on the first deploy; gives the VPC an IPv6 CIDR block so the
  # Egress-Only Internet Gateway can carry IPv6 traffic. On subsequent deploys
  # CloudFormation will adopt the existing association (no-op if already set).

  VpcIpv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      AmazonProvidedIpv6CidrBlock: true

  # ---------------------------------------------------------------------------
  # Lambda private subnets — shared across all Lambda functions in this VPC
  # ---------------------------------------------------------------------------

  LambdaSubnetAz1:
    Type: AWS::EC2::Subnet
    Condition: HasVpc
    DependsOn: VpcIpv6CidrBlock
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref LambdaSubnetCidrAz1
      Ipv6CidrBlock: !If
        - HasVpcIpv6Block
        - !Select [8, !Cidr [!Ref VpcIpv6Block, 256, 64]]
        - !Ref "AWS::NoValue"
      AssignIpv6AddressOnCreation: !If [HasVpcIpv6Block, true, !Ref "AWS::NoValue"]
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-az1"
        - Key: Stack
          Value: !Ref AWS::StackName

  LambdaSubnetAz2:
    Type: AWS::EC2::Subnet
    Condition: HasVpc
    DependsOn: VpcIpv6CidrBlock
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref LambdaSubnetCidrAz2
      Ipv6CidrBlock: !If
        - HasVpcIpv6Block
        - !Select [9, !Cidr [!Ref VpcIpv6Block, 256, 64]]
        - !Ref "AWS::NoValue"
      AssignIpv6AddressOnCreation: !If [HasVpcIpv6Block, true, !Ref "AWS::NoValue"]
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-az2"
        - Key: Stack
          Value: !Ref AWS::StackName

  LambdaSubnetAz1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: HasVpc
    Properties:
      SubnetId: !Ref LambdaSubnetAz1
      RouteTableId: !Ref LambdaRouteTable

  LambdaSubnetAz2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: HasVpc
    Properties:
      SubnetId: !Ref LambdaSubnetAz2
      RouteTableId: !Ref LambdaRouteTable

  # ---------------------------------------------------------------------------
  # Bedrock Interface VPC endpoints — single AZ, private DNS
  # ---------------------------------------------------------------------------
  # Bedrock service endpoints do not return AAAA records so they cannot be
  # reached via the IPv6 EIGW. All other AWS services use EIGW IPv6.

  BedrockVpceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasVpc
    Properties:
      GroupDescription: HTTPS from Lambda to Bedrock Interface VPC endpoints
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from within the VPC (IPv4)
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  BedrockRuntimeVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.bedrock-runtime"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref LambdaSubnetAz1
      SecurityGroupIds:
        - !Ref BedrockVpceSecurityGroup
      PrivateDnsEnabled: true

  BedrockAgentRuntimeVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.bedrock-agent-runtime"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref LambdaSubnetAz1
      SecurityGroupIds:
        - !Ref BedrockVpceSecurityGroup
      PrivateDnsEnabled: true

  BedrockAgentVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.bedrock-agent"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref LambdaSubnetAz1
      SecurityGroupIds:
        - !Ref BedrockVpceSecurityGroup
      PrivateDnsEnabled: true

  # ---------------------------------------------------------------------------
  # Lambda route table + Egress-Only Internet Gateway (owned by this stack)
  # ---------------------------------------------------------------------------
  # The stack creates its own private route table and EIGW so no external
  # PrivateRouteTableId or EgressOnlyInternetGatewayId inputs are required.
  # S3 and DynamoDB Gateway endpoints are attached to this route table, and
  # a ::/0 IPv6 route to the EIGW lets Lambda reach AWS public endpoints
  # (Bedrock, Secrets Manager, AMP) over IPv6 without a NAT Gateway.

  LambdaRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-rt"
        - Key: Stack
          Value: !Ref AWS::StackName

  LambdaEgressOnlyInternetGateway:
    Type: AWS::EC2::EgressOnlyInternetGateway
    Condition: HasVpc
    Properties:
      VpcId: !Ref VpcId

  LambdaIpv6EgressRoute:
    Type: AWS::EC2::Route
    Condition: HasVpc
    DependsOn: LambdaEgressOnlyInternetGateway
    Properties:
      RouteTableId: !Ref LambdaRouteTable
      DestinationIpv6CidrBlock: "::/0"
      EgressOnlyInternetGatewayId: !Ref LambdaEgressOnlyInternetGateway

Outputs:

  ObservatoryMetricsTableName:
    Description: DynamoDB table name for Observatory telemetry spans
    Value: !Ref ObservatoryMetricsTable
    Export:
      Name: !Sub "${AWS::StackName}-ObservatoryMetricsTableName"

  ObservatoryMetricsTableArn:
    Description: DynamoDB table ARN for Observatory telemetry spans
    Value: !GetAtt ObservatoryMetricsTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ObservatoryMetricsTableArn"

  AMPWorkspaceArn:
    Description: Amazon Managed Prometheus workspace ARN
    Value: !GetAtt AMPWorkspace.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AMPWorkspaceArn"

  AMPWorkspaceId:
    Description: Amazon Managed Prometheus workspace ID
    Value: !GetAtt AMPWorkspace.WorkspaceId
    Export:
      Name: !Sub "${AWS::StackName}-AMPWorkspaceId"

  LambdaSubnetIds:
    Condition: HasVpc
    Description: Comma-separated subnet IDs for Lambda VPC config (shared across all functions)
    Value: !Sub "${LambdaSubnetAz1},${LambdaSubnetAz2}"
    Export:
      Name: !Sub "${AWS::StackName}-LambdaSubnetIds"

  LambdaSubnetAz1Id:
    Condition: HasVpc
    Description: Lambda private subnet in AZ index 0
    Value: !Ref LambdaSubnetAz1
    Export:
      Name: !Sub "${AWS::StackName}-LambdaSubnetAz1Id"

  LambdaSubnetAz2Id:
    Condition: HasVpc
    Description: Lambda private subnet in AZ index 1
    Value: !Ref LambdaSubnetAz2
    Export:
      Name: !Sub "${AWS::StackName}-LambdaSubnetAz2Id"

  S3VpcEndpointId:
    Condition: HasVpc
    Description: S3 Gateway VPC endpoint ID
    Value: !Ref S3VpcEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-S3VpcEndpointId"

  DynamoDbVpcEndpointId:
    Condition: HasVpc
    Description: DynamoDB Gateway VPC endpoint ID
    Value: !Ref DynamoDbVpcEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-DynamoDbVpcEndpointId"

  LambdaRouteTableId:
    Condition: HasVpc
    Description: Route table ID for Lambda private subnets (owned by this stack)
    Value: !Ref LambdaRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-LambdaRouteTableId"

  EgressOnlyInternetGatewayId:
    Condition: HasVpc
    Description: Egress-Only Internet Gateway ID created by this stack for Lambda IPv6 egress
    Value: !Ref LambdaEgressOnlyInternetGateway
    Export:
      Name: !Sub "${AWS::StackName}-EgressOnlyInternetGatewayId"

  Ipv6EgressEnabled:
    Description: Whether a ::/0 IPv6 route to the Egress-Only Internet Gateway is active
    Value: !If [HasVpc, "true", "false"]
    Export:
      Name: !Sub "${AWS::StackName}-Ipv6EgressEnabled"

  DualStackEnabled:
    Description: Whether Lambda subnets are configured for dual-stack (IPv4 + IPv6)
    Value: !If [HasVpcIpv6Block, "true", "false"]
    Export:
      Name: !Sub "${AWS::StackName}-DualStackEnabled"

  VpcIpv6Block:
    Condition: HasVpcIpv6Block
    Description: IPv6 /56 CIDR block associated with the VPC
    Value: !Ref VpcIpv6Block
    Export:
      Name: !Sub "${AWS::StackName}-VpcIpv6Block"

  BedrockRuntimeVpcEndpointId:
    Condition: HasVpc
    Description: Interface VPC endpoint ID for bedrock-runtime (single AZ)
    Value: !Ref BedrockRuntimeVpcEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-BedrockRuntimeVpcEndpointId"

  BedrockAgentRuntimeVpcEndpointId:
    Condition: HasVpc
    Description: Interface VPC endpoint ID for bedrock-agent-runtime (single AZ)
    Value: !Ref BedrockAgentRuntimeVpcEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-BedrockAgentRuntimeVpcEndpointId"

  BedrockAgentVpcEndpointId:
    Condition: HasVpc
    Description: Interface VPC endpoint ID for bedrock-agent (control-plane)
    Value: !Ref BedrockAgentVpcEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-BedrockAgentVpcEndpointId"


