name: Deploy TeamWeave Backend (SAM)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: tarun-content-team
  SHARED_STACK_NAME: tarun-teamweave-shared
  BEDROCK_AGENTS_STACK_NAME: tarun-bedrock-agents
  FOUNDATION_MODEL_ID: amazon.nova-micro-v1:0
  AGENT_SERVICE_ROLE_ARN: arn:aws:iam::239571291755:role/BedrockAgentServiceRole-Tarun
  TEAM_CONFIG_PREFIX: teams
  VECTOR_DB_TABLE: resume-rag-db
  GEMINI_SECRET_ARN: arn:aws:secretsmanager:us-east-1:239571291755:secret:gemini/api_key-SKx2NV
  SAM_DEPLOYER_ROLE_NAME: teamweave-github-actions-sam-deployer
  ASSUME_ROLE_ARN: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
  # VPC / networking config consumed by the shared stack
  VPC_ID: vpc-f3c92a8a
  LAMBDA_SUBNET_CIDR_AZ1: "172.31.96.0/24"
  LAMBDA_SUBNET_CIDR_AZ2: "172.31.97.0/24"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Push docs to expertise RAG artifacts
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          find . \( -name "*.md" -o -name "*.puml" \) \
            -not -path "*/assets/*" | while read -r file; do
            aws s3 cp "$file" "s3://expertise-rag-artifacts-239571291755-prod/raw/${REPO_NAME}/${file#./}"
          done

      - name: SAM Build
        run: |
          cd infra
          rm -rf .aws-sam
          sam build -t template.yaml

      - name: Validate SAM Template
        run: |
          cd infra
          sam validate --lint

      - name: Deploy Shared Infrastructure Stack
        run: |
          cd infra

          # Discover the VPC's actual associated IPv6 CIDR from AWS — source of truth.
          # This avoids hardcoding a CIDR that may differ from what VpcIpv6CidrBlock assigned.
          _discover_ipv6() {
            aws ec2 describe-vpcs \
              --vpc-ids "${VPC_ID}" \
              --region "${AWS_REGION}" \
              --query 'Vpcs[0].Ipv6CidrBlockAssociationSet[?State==`associated`] | [0].Ipv6CidrBlock' \
              --output text 2>/dev/null || echo ""
          }
          EFFECTIVE_IPV6=$(_discover_ipv6)
          [ "${EFFECTIVE_IPV6}" = "None" ] && EFFECTIVE_IPV6=""
          echo "VPC IPv6 CIDR: ${EFFECTIVE_IPV6:-<none yet — VpcIpv6CidrBlock will request one>}"

          PARAM_OVERRIDES="VpcId=${VPC_ID}"
          [ -n "${LAMBDA_SUBNET_CIDR_AZ1}" ] && PARAM_OVERRIDES="${PARAM_OVERRIDES} LambdaSubnetCidrAz1=${LAMBDA_SUBNET_CIDR_AZ1}"
          [ -n "${LAMBDA_SUBNET_CIDR_AZ2}" ] && PARAM_OVERRIDES="${PARAM_OVERRIDES} LambdaSubnetCidrAz2=${LAMBDA_SUBNET_CIDR_AZ2}"
          [ -n "${EFFECTIVE_IPV6}" ]         && PARAM_OVERRIDES="${PARAM_OVERRIDES} VpcIpv6Block=${EFFECTIVE_IPV6}"

          sam deploy \
            --template-file shared.yaml \
            --stack-name "${SHARED_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --s3-prefix "${SHARED_STACK_NAME}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides ${PARAM_OVERRIDES}

          # Two-pass: if the VPC had no IPv6 CIDR before this deploy, VpcIpv6CidrBlock
          # just created one. Re-deploy immediately with the newly assigned CIDR so
          # Lambda subnets get their /64 CIDRs in the same CI run.
          if [ -z "${EFFECTIVE_IPV6}" ]; then
            NEWLY_ASSIGNED=$(_discover_ipv6)
            [ "${NEWLY_ASSIGNED}" = "None" ] && NEWLY_ASSIGNED=""
            if [ -n "${NEWLY_ASSIGNED}" ]; then
              echo "IPv6 CIDR newly assigned: ${NEWLY_ASSIGNED} — re-deploying to activate dual-stack subnets."
              sam deploy \
                --template-file shared.yaml \
                --stack-name "${SHARED_STACK_NAME}" \
                --region "${AWS_REGION}" \
                --capabilities CAPABILITY_NAMED_IAM \
                --resolve-s3 \
                --s3-prefix "${SHARED_STACK_NAME}" \
                --no-confirm-changeset \
                --no-fail-on-empty-changeset \
                --parameter-overrides "${PARAM_OVERRIDES} VpcIpv6Block=${NEWLY_ASSIGNED}"
            fi
          fi

      - name: Fetch Shared Stack Outputs
        run: |
          SHARED_OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${SHARED_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs" \
            --output json)

          get_output() {
            echo "${SHARED_OUTPUTS}" | python3 -c \
              "import json,sys; d={o['OutputKey']:o['OutputValue'] for o in json.load(sys.stdin)}; print(d.get('$1',''))"
          }

          OBSERVATORY_METRICS_TABLE_NAME=$(get_output ObservatoryMetricsTableName)
          OBSERVATORY_METRICS_TABLE_ARN=$(get_output ObservatoryMetricsTableArn)
          AMP_WORKSPACE_ARN=$(get_output AMPWorkspaceArn)
          AMP_WORKSPACE_ID=$(get_output AMPWorkspaceId)
          LAMBDA_SUBNET_IDS=$(get_output LambdaSubnetIds)
          S3_VPCE_ID=$(get_output S3VpcEndpointId)
          DYNAMODB_VPCE_ID=$(get_output DynamoDbVpcEndpointId)
          EIGW_ID=$(get_output EgressOnlyInternetGatewayId)
          IPV6_EGRESS_ENABLED=$(get_output Ipv6EgressEnabled)
          DUAL_STACK_ENABLED=$(get_output DualStackEnabled)
          VPC_IPV6_BLOCK_OUT=$(get_output VpcIpv6Block)

          if [ -z "${OBSERVATORY_METRICS_TABLE_NAME}" ] || [ -z "${AMP_WORKSPACE_ID}" ]; then
            echo "ERROR: Required outputs missing from shared stack ${SHARED_STACK_NAME}"
            exit 1
          fi

          echo "OBSERVATORY_METRICS_TABLE_NAME=${OBSERVATORY_METRICS_TABLE_NAME}" >> $GITHUB_ENV
          echo "OBSERVATORY_METRICS_TABLE_ARN=${OBSERVATORY_METRICS_TABLE_ARN}"   >> $GITHUB_ENV
          echo "AMP_WORKSPACE_ARN=${AMP_WORKSPACE_ARN}"                           >> $GITHUB_ENV
          echo "AMP_WORKSPACE_ID=${AMP_WORKSPACE_ID}"                             >> $GITHUB_ENV
          echo "LAMBDA_SUBNET_IDS=${LAMBDA_SUBNET_IDS}"                           >> $GITHUB_ENV
          echo "S3_VPCE_ID=${S3_VPCE_ID}"                                         >> $GITHUB_ENV
          echo "DYNAMODB_VPCE_ID=${DYNAMODB_VPCE_ID}"                             >> $GITHUB_ENV
          echo "EIGW_ID=${EIGW_ID}"                                               >> $GITHUB_ENV
          echo "IPV6_EGRESS_ENABLED=${IPV6_EGRESS_ENABLED}"                       >> $GITHUB_ENV
          echo "DUAL_STACK_ENABLED=${DUAL_STACK_ENABLED}"                         >> $GITHUB_ENV
          echo "VPC_IPV6_BLOCK_OUT=${VPC_IPV6_BLOCK_OUT}"                         >> $GITHUB_ENV

          echo "Shared stack outputs fetched:"
          echo "  ObservatoryMetricsTableName      = ${OBSERVATORY_METRICS_TABLE_NAME}"
          echo "  AMPWorkspaceId                   = ${AMP_WORKSPACE_ID}"
          echo "  LambdaSubnetIds                  = ${LAMBDA_SUBNET_IDS:-<not created>}"
          echo "  S3VpcEndpointId                  = ${S3_VPCE_ID:-<not created>}"
          echo "  DynamoDbVpcEndpointId            = ${DYNAMODB_VPCE_ID:-<not created>}"
          echo "  EgressOnlyInternetGatewayId      = ${EIGW_ID:-<not created>}"
          echo "  Ipv6EgressEnabled                = ${IPV6_EGRESS_ENABLED}"
          echo "  DualStackEnabled                 = ${DUAL_STACK_ENABLED}"
          echo "  VpcIpv6Block                     = ${VPC_IPV6_BLOCK_OUT:-<not yet assigned — set VPC_IPV6_BLOCK after first deploy>}"

      - name: Fetch SIWE Authorizer ARN from siwe-infra stack
        run: |
          SIWE_AUTHORIZER_FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name siwe-infra \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='AuthorizerFunctionArn'].OutputValue" \
            --output text)
          if [ -z "${SIWE_AUTHORIZER_FUNCTION_ARN}" ]; then
            echo "ERROR: AuthorizerFunctionArn not found in siwe-infra stack outputs"
            exit 1
          fi
          echo "SIWE_AUTHORIZER_FUNCTION_ARN=${SIWE_AUTHORIZER_FUNCTION_ARN}" >> $GITHUB_ENV
          echo "Fetched SIWE authorizer ARN: ${SIWE_AUTHORIZER_FUNCTION_ARN}"

      - name: SAM Deploy
        run: |
          cd infra
          ASSUME_ROLE_NAME="${ASSUME_ROLE_ARN##*/}"

          # Build parameter overrides — omit optional params when empty so SAM
          # doesn't receive "Key=" which it rejects as invalid.
          PARAM_OVERRIDES=(
            "TeamConfigPrefix=${TEAM_CONFIG_PREFIX}"
            "VectorDbTable=${VECTOR_DB_TABLE}"
            "GeminiSecretArn=${GEMINI_SECRET_ARN}"
            "SamDeployerRoleName=${SAM_DEPLOYER_ROLE_NAME}"
            "SamAssumeRoleName=${ASSUME_ROLE_NAME}"
            "SiweAuthorizerFunctionArn=${SIWE_AUTHORIZER_FUNCTION_ARN}"
            "SharedStackName=${SHARED_STACK_NAME}"
            "ObservatoryMetricsTableName=${OBSERVATORY_METRICS_TABLE_NAME}"
            "ObservatoryMetricsTableArn=${OBSERVATORY_METRICS_TABLE_ARN}"
            "AMPWorkspaceArn=${AMP_WORKSPACE_ARN}"
            "AMPWorkspaceId=${AMP_WORKSPACE_ID}"
          )
          [ -n "${LAMBDA_SUBNET_IDS}" ]            && PARAM_OVERRIDES+=("LambdaSubnetIds=${LAMBDA_SUBNET_IDS}")
          [ -n "${S3_VPCE_ID}" ]                   && PARAM_OVERRIDES+=("S3VpcEndpointId=${S3_VPCE_ID}")
          [ -n "${DYNAMODB_VPCE_ID}" ]             && PARAM_OVERRIDES+=("DynamoDbVpcEndpointId=${DYNAMODB_VPCE_ID}")
          [ -n "${DUAL_STACK_ENABLED}" ]           && PARAM_OVERRIDES+=("DualStackEnabled=${DUAL_STACK_ENABLED}")

          sam deploy \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Sync team configs to S3
        run: |
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ConfigBucket'].OutputValue" \
            --output text)
          echo "Syncing config/examples/teams/ → s3://${CONFIG_BUCKET}/${TEAM_CONFIG_PREFIX}/"
          aws s3 sync config/examples/teams/ \
            "s3://${CONFIG_BUCKET}/${TEAM_CONFIG_PREFIX}/" \
            --exclude "*.md" \
            --region "${AWS_REGION}"

      - name: Sync roles and departments to S3
        run: |
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ConfigBucket'].OutputValue" \
            --output text)
          echo "Uploading roles.json and departments.json → s3://${CONFIG_BUCKET}/teams/"
          aws s3 cp config/examples/roles.json \
            "s3://${CONFIG_BUCKET}/roles.json" \
            --region "${AWS_REGION}"
          aws s3 cp config/examples/departments.json \
            "s3://${CONFIG_BUCKET}/departments.json" \
            --region "${AWS_REGION}"

      - name: Provision team agents
        run: |
          PROVISION_FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ProvisionTeamFunctionArn'].OutputValue" \
            --output text)
          echo "Invoking ProvisionTeamFunction: ${PROVISION_FUNCTION_ARN}"
          aws lambda invoke \
            --function-name "${PROVISION_FUNCTION_ARN}" \
            --region "${AWS_REGION}" \
            --cli-binary-format raw-in-base64-out \
            --payload '{"httpMethod":"POST","path":"/teams","headers":{},"body":"{}","queryStringParameters":null}' \
            provision_response.json
          cat provision_response.json
          STATUS=$(python3 -c "import json; d=json.load(open('provision_response.json')); print(d.get('statusCode', 200))")
          if [ "$STATUS" != "200" ]; then
            echo "Provision failed with HTTP status $STATUS"
            exit 1
          fi
      - name: Dump CloudFormation events on failure
        if: failure()
        run: |
          echo "Deployment failed. Fetching recent CloudFormation events for shared stack..."
          aws cloudformation describe-stack-events \
            --stack-name "${SHARED_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --max-items 30 || true
          echo "Fetching recent CloudFormation events for SAM stack..."
          aws cloudformation describe-stack-events \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --max-items 50 || true
          echo "Fetching recent CloudFormation events for Bedrock agents stack..."
          aws cloudformation describe-stack-events \
            --stack-name "${BEDROCK_AGENTS_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --max-items 50 || true