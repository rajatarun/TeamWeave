name: Deploy TeamWeave Backend (SAM)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: tarun-content-team
  BEDROCK_AGENTS_STACK_NAME: tarun-bedrock-agents
  FOUNDATION_MODEL_ID: amazon.nova-micro-v1:0
  AGENT_SERVICE_ROLE_ARN: arn:aws:iam::239571291755:role/BedrockAgentServiceRole-Tarun
  TEAM_CONFIG_PREFIX: teams
  VECTOR_DB_TABLE: resume-rag-db
  GEMINI_SECRET_ARN: arn:aws:secretsmanager:us-east-1:239571291755:secret:gemini/api_key-SKx2NV
  SAM_DEPLOYER_ROLE_NAME: teamweave-github-actions-sam-deployer
  ASSUME_ROLE_ARN: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: |
          cd infra
          rm -rf .aws-sam
          sam build -t template.yaml

      - name: Validate SAM Template
        run: |
          cd infra
          sam validate --lint
          aws cloudformation validate-template --template-body file://template.yaml

      - name: SAM Deploy
        run: |
          cd infra
          ASSUME_ROLE_NAME="${ASSUME_ROLE_ARN##*/}"
          sam deploy \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "TeamConfigPrefix=${TEAM_CONFIG_PREFIX}" \
              "VectorDbTable=${VECTOR_DB_TABLE}" \
              "GeminiSecretArn=${GEMINI_SECRET_ARN}" \
              "SamDeployerRoleName=${SAM_DEPLOYER_ROLE_NAME}" \
              "SamAssumeRoleName=${ASSUME_ROLE_NAME}"


      - name: Validate Bedrock Agents Template
        run: |
          cd infra
          sam validate -t bedrock-agents.yaml --lint

      - name: Deploy Bedrock Agents Stack
        run: |
          cd infra
          ASSUME_ROLE_NAME="${ASSUME_ROLE_ARN##*/}"
          sam deploy \
            --template-file bedrock-agents.yaml \
            --stack-name "${BEDROCK_AGENTS_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "FoundationModelId=${FOUNDATION_MODEL_ID}" \
              "AgentServiceRoleArn=${AGENT_SERVICE_ROLE_ARN}" \
              "SamAssumeRoleName=${ASSUME_ROLE_NAME}" \
              "EnableGuardrails=false"

      - name: Resolve Bedrock role from CloudFormation outputs
        run: |
          BEDROCK_ROLE_ARN=$(aws cloudformation describe-stacks --stack-name "${BEDROCK_AGENTS_STACK_NAME}" --region "${AWS_REGION}" --query "Stacks[0].Outputs[?OutputKey=='BedrockAgentServiceRoleArn'].OutputValue" --output text)

          if [ -z "$BEDROCK_ROLE_ARN" ] || [ "$BEDROCK_ROLE_ARN" = "None" ]; then
            echo "BedrockAgentServiceRoleArn output not found in stack ${BEDROCK_AGENTS_STACK_NAME}" >&2
            exit 1
          fi

          echo "BEDROCK_ROLE_ARN=$BEDROCK_ROLE_ARN" >> "$GITHUB_ENV"

      - name: Dump CloudFormation events on failure
        if: failure()
        run: |
          echo "Deployment failed. Fetching recent CloudFormation events for SAM stack..."
          aws cloudformation describe-stack-events \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --max-items 50 || true
          echo "Fetching recent CloudFormation events for Bedrock agents stack..."
          aws cloudformation describe-stack-events \
            --stack-name "${BEDROCK_AGENTS_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --max-items 50 || true

      - name: Resolve config bucket from CloudFormation outputs
        run: |
          CONFIG_BUCKET=$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --region "${AWS_REGION}" --query "Stacks[0].Outputs[?OutputKey=='ConfigBucket'].OutputValue" --output text)

          if [ -z "$CONFIG_BUCKET" ] || [ "$CONFIG_BUCKET" = "None" ]; then
            echo "ConfigBucket output not found in stack ${STACK_NAME}" >&2
            exit 1
          fi

          echo "CONFIG_BUCKET=$CONFIG_BUCKET" >> "$GITHUB_ENV"

      - name: Provision team config artifacts
        working-directory: config/examples
        run: |
          python provision_team.py \
            --roles roles.json \
            --depts departments.json \
            --bucket "$CONFIG_BUCKET" \
            --bedrock-role-arn "$BEDROCK_ROLE_ARN"

      - name: Test team task endpoint
        run: |
          curl --connect-timeout 10 --max-time 300 -X POST https://zua5drbgpi.execute-api.us-east-1.amazonaws.com/prod/team/task \
            -H "Content-Type: application/json" \
            -d '{
              "team": "tarun_visibility_team",
              "version": "v1",
              "request": {
                "topic": "Agentic AI governance in banking",
                "channel": "linkedin",
                "audience": "CTOs",
                "objective": "Increase authority positioning",
                "constraints": ["No fabricated citations"]
              }
            }'
